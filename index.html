    const cover = p.needH > 0 ? clamp(p.availLecH / p.needH, 0, 1) : 1;
    const barColor = p.status === 'bad' ? 'var(--bad)' : p.status === 'warn' ? 'var(--warn)' : undefined;
    const tArrow = p.trend ? (p.trend.dir === 'down' ? `<span class="badge s-ok">↓ ${fmtH(Math.abs(p.trend.delta))} vs last week</span>`
                            : p.trend.dir === 'up' ? `<span class="badge s-bad">↑ ${fmtH(p.trend.delta)} vs last week</span>`
                            : '<span class="badge s-ok">steady</span>') : '';
    const adjTxt = Math.abs(p.adj) < .05 ? 'you are exactly on your planned hours'
      : p.adj < 0 ? `<b class="ok-t">−${fmtH(-p.adj)}</b> credited back — you're ${fmtH(-p.dbt.debt)} ahead of your own plan`
      : `<b class="bad-t">+${fmtH(p.adj)}</b> added — ${fmtH(p.dbt.debt)} of debt spread over ${p.dbt.window} days`;
    paceCard = `<div class="card pad ${wide ? 'c6' : 'c4'}">
      <div class="card-h"><span class="card-t">${icon('zap')} Required pace <span class="tiny muted">· adaptive</span></span>${statusBadge(p.status)}</div>
      ${p.remLect === 0
        ? `<div class="kpi"><span class="kpi-num disp">Done</span><span class="kpi-sub">all lectures finished</span></div>
           <div class="small muted mt6">Your full ${fmtH(p.todayH)} today belongs to practice, revision and mocks.</div>`
        : `<div class="kpi"><span class="kpi-num disp">${fmtH(p.adaptive)}</span><span class="kpi-sub">today · ${tArrow}</span></div>
           <div class="small muted mt6">Baseline <b>${fmtH(p.totalNeeded)}</b>/day, ${adjTxt}.</div>
           ${bar(cover, barColor)}
           <div class="tiny muted">${fmtN(p.remLect)} lectures left · ${fmtH(p.needH)}/day of lectures (≈${p.lectPerDay.toFixed(1)}/day) · finish by ${fmtD(addDays(p.nearest.date, -p.buf))}</div>
           <div class="tiny muted mt6"><button class="btn sm ghost" data-action="nav" data-view="planner">How is this computed?</button></div>`}
    </div>`;
  } else {
    paceCard = `<div class="card pad ${wide ? 'c6' : 'c4'}">
      <div class="card-h"><span class="card-t">${icon('zap')} Required pace</span></div>
      <p class="small muted">No upcoming exam date. Set one in Settings and pacing lights up.</p>
      <div class="mt6"><button class="btn sm" data-action="nav" data-view="settings">Open Settings</button></div></div>`;
  }

  const lt = lecTotals(activeSubjects());
  const rings = exs.map(e => `<div class="ring-cell">${ring(weightedProgress(e.key), {
    size: 102, stroke: 9, label: e.short + ' · weighted',
    c1: e.key === 'cse' ? '#7C93FF' : '#34D3B1', c2: e.key === 'cse' ? '#5EC8F2' : '#8FD16E',
  })}</div>`).join('');
  const progressCard = `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('trend')} Syllabus progress</span></div>
    <div class="rings">${rings}</div>
    <div class="tiny muted center">${fmtN(lt.done)} / ${fmtN(lt.total)} lectures · ≈${fmtH(lt.remH)} of watching left</div></div>`;

  const phaseCard = p ? `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('flag')} Current phase</span>
      <span class="badge" style="background:${p.phase.color}22;color:${p.phase.color};border-color:${p.phase.color}66">${p.phase.name}</span></div>
    <div class="tiny muted">${p.phase.range} · driven by ${p.nearest.label} (${p.nearest.days}d)</div>
    ${splitChips(p.phase.split, p.H)}
    <div class="tiny muted mt6">${p.phase.mocksWk}× ${p.phase.mockType}${p.phase.mocksWk > 1 ? 's' : ''} per week</div></div>` : '';

  const st = streaks();
  const streakCard = `<div class="card pad dash-streak">
    <div class="card-h"><span class="card-t">${icon('flame')} Streak</span><span class="tiny muted">best ${st.best}d</span></div>
    <div class="kpi"><span class="kpi-num disp">${st.cur}</span><span class="kpi-sub">day${st.cur === 1 ? '' : 's'} in a row</span></div>
    ${weekBars()}
    <div class="tiny muted">${fmtH(st.totalH)} logged · ${fmtN(st.totalL)} lectures · ${fmtN(st.totalQ)} questions</div></div>`;

  const plan = todaysPlan();
  const checks = planChecksToday();
  const planCard = `<div class="card pad dash-plan">
    <div class="card-h"><span class="card-t">${icon('spark')} Today's plan</span>
      <span class="frow g8">
        ${plan.edited ? `<button class="btn sm ghost" data-action="plan-reset">${icon('rotate')} Reset</button>` : ''}
        <button class="btn sm" data-action="plan-add">${icon('plus')} Add task</button>
      </span></div>
    <div class="plan-list">${plan.items.length ? plan.items.map(it => `
      <div class="plan-item${checks[it.id] ? ' done' : ''}" data-pid="${esc(it.id)}">
        <label class="pi-main">
          <input type="checkbox" data-action="plan-check" data-pid="${esc(it.id)}"${checks[it.id] ? ' checked' : ''}>
          <span class="pi-ic">${icon(it.ic)}</span>
          <span class="pi-tx"><b>${esc(it.text)}</b><span>${esc(it.meta || '')}${it.repeat ? ' · repeats daily' : ''}</span></span>
        </label>
        <span class="pi-hint tiny muted">tap ✎ to edit</span>
        <span class="pi-acts">
          <button class="icon-btn" data-action="plan-edit" title="Edit task" aria-label="Edit task">${icon('pencil')}</button>
          <button class="icon-btn del" data-action="plan-del" title="Remove task" aria-label="Remove task">${icon('trash')}</button>
        </span>
      </div>`).join('') : `<p class="small muted">Plan is empty — add a task, or hit Reset to bring back the auto-plan.</p>`}</div>
    <div class="tiny muted mt6">${fmtDY(todayISO())} · auto-built from your phase, progress and weightage. Edit or delete anything — changes apply to today; tick <b>repeat daily</b> to keep a task on every future day too.</div></div>`;

  const tl = S.logs[todayISO()] || {};
  const quickCard = `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('cal')} Log today</span>${hasLog(todayISO()) ? '<span class="badge s-ok">logged</span>' : ''}</div>
    <form id="quick-log" class="qform">
      <div class="field"><label>Hours</label><input class="input" name="hours" type="number" inputmode="decimal" min="0" max="24" step="0.5" value="${tl.hours ?? ''}" placeholder="0"></div>
      <div class="field"><label>Lectures</label><input class="input" name="lectures" type="number" inputmode="numeric" min="0" step="1" value="${tl.lectures ?? ''}" placeholder="0"></div>
      <div class="field"><label>Questions</label><input class="input" name="questions" type="number" inputmode="numeric" min="0" step="1" value="${tl.questions ?? ''}" placeholder="0"></div>
      <button class="btn primary" type="submit">Save day</button>
    </form>
    <div class="tiny muted mt6">The +/− steppers in Subjects auto-count lectures into today's log.</div></div>`;

  const rd = readiness();
  const readyCard = `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('gauge')} Readiness</span>
      <button class="btn sm ghost" data-action="nav" data-view="insights">Details</button></div>
    <div class="kpi"><span class="kpi-num disp">${Math.round(rd.score)}</span><span class="kpi-sub">/ 100</span></div>
    ${bar(rd.score / 100, rd.score >= 70 ? 'var(--ok)' : rd.score >= 45 ? 'var(--warn)' : 'var(--bad)')}
    <div class="tiny muted">Biggest lever: <b>${esc(rd.gap.label)}</b> — ${esc(rd.gap.hint)}</div></div>`;

  const due = revDue();
  const upc = revUpcoming().filter(x => x.r.dueIn > 0).slice(0, 3);
  const revCard = `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('rotate')} Revision queue</span>
      ${due.length ? `<span class="badge s-warn">${due.length} due</span>` : upc.length ? '<span class="badge s-ok">clear</span>' : ''}</div>
    ${due.length ? `<div class="plan-list">${due.slice(0, 3).map(x => `
        <div class="plan-item">
          <span class="pi-ic">${icon('rotate')}</span>
          <span class="pi-tx"><b>${esc(x.s.name)}</b><span>pass ${x.r.pass} · ${x.r.dueIn === 0 ? 'due today' : `${-x.r.dueIn}d overdue`}</span></span>
          <span class="pi-acts"><button class="btn sm" data-action="rev-done" data-id="${x.s.id}">Done</button></span>
        </div>`).join('')}</div>`
      : upc.length ? `<div class="small muted">Nothing due today. Next up:</div>
        <div class="split-chips">${upc.map(x => `<span class="schip"><i style="background:${x.s.color}"></i>${esc(x.s.name)} <b>in ${x.r.dueIn}d</b></span>`).join('')}</div>`
      : `<p class="small muted">Finish a subject and Ascent schedules its revisions at ${revIntervals().join(' / ')} days — the forgetting curve, handled.</p>`}
  </div>`;

  const tsubs = activeSubjects().filter(s => (+s.done || 0) < (+s.total || 0));
  const timerCard = `<div class="card pad c4">
    <div class="card-h"><span class="card-t">${icon('play')} Focus block</span><span class="tiny muted">auto-logs your hours</span></div>
    <div class="timer-wrap">
      <div class="timer-face"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" class="ring-bg" stroke-width="8"/>
        <circle id="timer-ring" cx="60" cy="60" r="52" class="ring-fg" stroke="var(--acc)" stroke-width="8" stroke-linecap="round" transform="rotate(-90 60 60)"/></svg>
        <b class="disp" id="timer-face">--:--</b></div>
      <div class="timer-side">
        <select class="input" id="timer-sub" aria-label="Subject">
          <option value="">No subject</option>
          ${tsubs.map(s => `<option value="${s.id}"${S.timer && S.timer.sid === s.id ? ' selected' : ''}>${esc(s.name)}</option>`).join('')}
        </select>
        <input class="input" id="timer-min" type="number" min="10" max="180" step="5" value="${S.timer ? S.timer.mins : (+S.settings.pomoWork || 50)}" aria-label="Minutes">
        <div class="frow g8" id="timer-btns"></div>
      </div>
    </div></div>`;

  const heatCard = `<div class="card pad c12">
    <div class="card-h"><span class="card-t">${icon('cal')} Consistency</span>${heatHead()}</div>
    ${heatmap()}</div>`;

  const sub = p
    ? `${p.nearest.days} days to ${p.nearest.label}. ${p.remLect > 0 ? fmtN(p.remLect) + ' lectures between you and done — every session counts.' : 'Lectures done. Now sharpen the blade.'}`
    : 'Set your exam dates in Settings and the whole machine lights up.';
  el.innerHTML = `<div class="vhead"><div><h1>Dashboard</h1><p class="vsub">${sub}</p></div>
    <div class="vact"><button class="btn ghost sm" data-action="palette">⌘K</button></div></div>
    <div class="grid">${banners}${counts}${paceCard}${readyCard}${progressCard}${phaseCard}${streakCard}${planCard}${quickCard}${revCard}${timerCard}${heatCard}</div>`;
  renderTimer();
}

/* ---------- Subjects ---------- */
function weightLabel(s) {
  if (s.exam === 'both') return `${+s.wc || 0}·${+s.wd || 0} marks`;
  return (s.exam === 'cse' ? +s.wc || 0 : +s.wd || 0) + ' marks';
}
function subjectCard(s) {
  const p = pct(s.done, s.total);
  const off = !subjectVisible(s);
  return `<div class="card subj${off ? ' inactive' : ''}" data-id="${s.id}" style="--sc:${s.color || '#7C93FF'}">
    <div class="subj-top"><div>
      <div class="subj-name">${esc(s.name)}</div>
      <div class="subj-meta">${badgeExam(s.exam)}<span class="tiny muted">W ${weightLabel(s)}</span><span class="tiny muted rem-h">≈${fmtH(remHrs(s))} left</span>${off ? '<span class="badge s-warn">off-plan</span>' : ''}</div>
    </div>
    <div class="subj-acts">
      <button class="icon-btn" data-action="sub-edit" aria-label="Edit ${esc(s.name)}">${icon('pencil')}</button>
      <button class="icon-btn" data-action="sub-del" aria-label="Delete ${esc(s.name)}">${icon('trash')}</button>
    </div></div>
    <div class="lect-row">
      <div class="stepper">
        <button class="step-b" data-action="sub-dec" aria-label="One lecture less">${icon('minus')}</button>
        <input class="step-in" data-action="sub-set" type="number" inputmode="numeric" min="0" max="${s.total}" value="${+s.done || 0}" aria-label="Lectures done">
        <span class="step-t">/ ${s.total}</span>
        <button class="step-b" data-action="sub-inc" aria-label="One lecture more">${icon('plus')}</button>
      </div>
      <span class="subj-pct disp">${Math.round(p * 100)}%</span>
    </div>
    ${bar(p)}
    <div class="subj-foot">
      <span class="tiny muted">PYQ</span>
      <input class="input mini" data-action="pyq-set" type="number" inputmode="numeric" min="0" value="${+s.pyqDone || 0}" aria-label="PYQs done">
      <span class="tiny muted">/ ${+s.pyqTotal || 0}</span>
      <span class="spacer"></span>
      <span class="tiny muted">Rev</span>
      <span class="rev-chips">${[1, 2, 3].map(n => `<button class="rev-chip${(+s.rev || 0) >= n ? ' on' : ''}" data-action="rev-set" data-n="${n}" aria-label="Revision ${n}">R${n}</button>`).join('')}</span>
    </div></div>`;
}
function subjSubText() {
  const lt = lecTotals(activeSubjects());
  let pyqT = 0, pyqD = 0;
  activeSubjects().forEach(s => { pyqT += +s.pyqTotal || 0; pyqD += Math.min(+s.pyqDone || 0, +s.pyqTotal || 0); });
  return `${fmtN(lt.rem)} lectures to go · ≈${fmtH(lt.remH)} of watching · PYQs ${fmtN(pyqD)}/${fmtN(pyqT)}`;
}
function sumBarsHtml() {
  return activeExams().map(e => {
    const w = weightedProgress(e.key), t = lecTotals(subjectsForExam(e.key));
    return `<div class="sum-row"><span class="badge b-${e.key}">${e.short}</span>
      <div class="sum-bar">${bar(w, e.key === 'cse' ? '#7C93FF' : '#34D3B1')}</div>
      <span class="small"><b>${Math.round(w * 100)}%</b> weighted · ${t.done}/${t.total} lect</span></div>`;
  }).join('');
}
function renderSubjects() {
  const el = $('#view-subjects');
  el.innerHTML = `<div class="vhead"><div><h1>Subjects</h1><p class="vsub" id="subj-substats">${subjSubText()}</p></div>
    <div class="vact"><button class="btn primary" data-action="sub-add">${icon('plus')} Add subject</button></div></div>
    <div class="card pad sum-card" id="sum-bars">${sumBarsHtml()}</div>
    <div class="toolbar">
      <div class="seg">${['all', 'both', 'cse', 'da'].map(f => `<button class="seg-b${subjFilter === f ? ' active' : ''}" data-action="sub-filter" data-f="${f}">${({ all: 'All', both: 'Common', cse: 'CSE', da: 'DA' })[f]}</button>`).join('')}</div>
      <input class="input search" id="subj-q" type="search" placeholder="Search subjects…" value="${esc(subjQuery)}">
      <select class="input select" data-action="sub-sort" aria-label="Sort subjects">
        ${[['default', 'Sort: default'], ['progress', 'Least complete'], ['remaining', 'Most hours left'], ['weight', 'Highest weight']].map(o => `<option value="${o[0]}"${subjSort === o[0] ? ' selected' : ''}>${o[1]}</option>`).join('')}
      </select>
    </div>
    <div class="subj-grid" id="subj-list"></div>`;
  renderSubjectList();
  const q = $('#subj-q');
  q.addEventListener('input', () => { subjQuery = q.value; renderSubjectList(); });
}
function renderSubjectList() {
  let list = S.subjects.slice();
  if (subjFilter !== 'all') list = list.filter(s => s.exam === subjFilter);
  if (subjQuery.trim()) { const q = subjQuery.trim().toLowerCase(); list = list.filter(s => s.name.toLowerCase().includes(q)); }
  if (subjSort === 'progress') list.sort((a, b) => pct(a.done, a.total) - pct(b.done, b.total));
  else if (subjSort === 'remaining') list.sort((a, b) => remHrs(b) - remHrs(a));
  else if (subjSort === 'weight') list.sort((a, b) => wMax(b) - wMax(a));
  const box = $('#subj-list');
  box.innerHTML = list.length ? list.map(subjectCard).join('')
    : `<div class="empty">${icon('book')}<b>No subjects match.</b><span>Try another filter or search — or add a new subject.</span></div>`;
}
function refreshSubjectCard(card, s) {
  if (!card) return;
  const p = pct(s.done, s.total);
  const inp = card.querySelector('.step-in'); if (inp) inp.value = +s.done || 0;
  const pc = card.querySelector('.subj-pct'); if (pc) pc.textContent = Math.round(p * 100) + '%';
  const bf = card.querySelector('.bar-f');    if (bf) bf.style.width = (p * 100).toFixed(1) + '%';
  const rh = card.querySelector('.rem-h');    if (rh) rh.textContent = `≈${fmtH(remHrs(s))} left`;
  const ss = $('#subj-substats'); if (ss) ss.textContent = subjSubText();
  const sb = $('#sum-bars');      if (sb) sb.innerHTML = sumBarsHtml();
}

/* ---------- Planner ---------- */
function verdictText(p, proj) {
  const tgt = fmtD(addDays(p.nearest.date, -p.buf));
  let s = '';
  if (p.remLect === 0) {
    s = `All lectures are done. Your ${fmtH(p.H)}/day now goes fully into practice, revision and mocks — ride the phase split above and keep the mock cadence honest.`;
  } else {
    s = `To finish all <b>${fmtN(p.remLect)}</b> remaining lectures by <b>${tgt}</b> (keeping a ${p.buf}-day buffer for pure revision + mocks), you need <b>${fmtH(p.needH)}/day of lecture time</b> — about ${p.lectPerDay.toFixed(1)} lectures at ${p.eff} min each. `;
    const diff = p.needH - p.availLecH;
    if (p.status === 'ok') s += `Your current budget covers it${diff < -0.4 ? ` with ${fmtH(-diff)}/day to spare — bank the surplus as extra practice` : ''}.`;
    else if (p.status === 'warn') s += `You're short by <b>${fmtH(diff)}/day</b>. Add ~${Math.ceil(diff * 6) * 10} focused minutes daily, or trim low-weight topics.`;
    else s += `You're short by <b>${fmtH(diff)}/day</b> — at this budget the syllabus won't close in time. Raise daily hours, cut low-weight subjects, or shrink the buffer in Settings.`;
  }
  if (proj.ready) s += ` At your actual 14-day pace (${proj.pace.lectPerDay.toFixed(1)} lect/day), you'd finish around <b>${fmtD(proj.finish)}</b> — <span class="${proj.ok ? 'ok-t' : 'bad-t'}">${proj.ok ? 'ahead of target' : 'past target'}</span>.`;
  else if (p.remLect > 0) s += ` Log a few days and the planner will also project your finish date from your real pace.`;
  return s;
}
function whatIfText(p, h) {
  if (p.remLect === 0) return '<span class="muted">Lectures are done — extra hours flow straight into practice, revision and mocks.</span>';
  const lecH = h * p.phase.split.lec;
  if (lecH <= .05) return '';
  const remH = p.remLect * p.eff / 60;
  const days = Math.ceil(remH / lecH);
  const fin = addDays(todayISO(), days);
  const tgt = addDays(p.nearest.date, -p.buf);
  const slack = Math.round((parseISO(tgt).getTime() - parseISO(fin).getTime()) / DAY);
  const ok = slack >= 0;
  const baseDays = p.availLecH > 0 ? Math.ceil(remH / p.availLecH) : null;
  const diff = baseDays != null ? baseDays - days : 0;
  const left = Math.max(0, p.nearest.days - days);
  let s = `At <b>${fmtH(h)}/day</b> (${fmtH(lecH)} of it on lectures at this phase's split), the remaining ${fmtN(p.remLect)} lectures take <b>${fmtN(days)} day${days === 1 ? '' : 's'}</b> — syllabus done around <b>${fmtD(fin)}</b>, <span class="${ok ? 'ok-t' : 'bad-t'}">${ok ? `${slack} day${slack === 1 ? '' : 's'} inside` : `${-slack} day${slack === -1 ? '' : 's'} past`}</span> your ${fmtD(tgt)} target.`;
  if (baseDays != null && diff !== 0) s += ` That's <b>${Math.abs(diff)} day${Math.abs(diff) === 1 ? '' : 's'} ${diff > 0 ? 'sooner' : 'later'}</b> than your current ${fmtH(p.H)}/day plan (${fmtN(baseDays)} days).`;
  s += ` Leaves <b>${fmtN(left)} day${left === 1 ? '' : 's'}</b> before ${p.nearest.short} for pure practice, revision and mocks.`;
  return s;
}

function examPaceCard(e, p) {
  const list = subjectsForExam(e.key).filter(subjectVisible);
  const t = lecTotals(list);
  const d = p.dEff[e.key];
  const need = t.remH / d;
  const w = weightedProgress(e.key);
  return `<div class="card pad c6">
    <div class="card-h"><span class="badge b-${e.key}">${e.label}</span><span class="tiny muted">${e.days}d left · finish lectures by ${fmtD(addDays(e.date, -p.buf))}</span></div>
    <div class="frow">
      <div class="mini-ring">${ring(w, { size: 78, stroke: 8, label: 'weighted', c1: e.key === 'cse' ? '#7C93FF' : '#34D3B1', c2: e.key === 'cse' ? '#5EC8F2' : '#8FD16E' })}</div>
      <div class="small" style="min-width:0">
        <div><b>${t.done}/${t.total}</b> lectures done · ${fmtN(t.rem)} left (≈${fmtH(t.remH)})</div>
        <div class="muted mt6">Needs <b>${fmtH(need)}</b>/day of lecture time for its syllabus${S.settings.mode === 'both' ? ' <span class="tiny">(common subjects counted in both cards)</span>' : ''}</div>
      </div></div></div>`;
}
function weekTemplate(p) {
  const names = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const dows = [1, 2, 3, 4, 5, 6, 0];
  const md = MOCK_DAYS[p.phase.mocksWk] || [];
  const sp = p.phase.split, H = p.H, today = new Date().getDay();
  return `<div class="week">${names.map((nm, i) => {
    const dow = dows[i], mock = md.includes(dow);
    const chips = mock
      ? `<span class="schip mockday"><i style="background:#FF8FB1"></i>${p.phase.mockType} + same-day analysis</span><span class="schip"><i style="background:#FFC554"></i>Light revision <b>${fmtH(Math.max(1, H * .25))}</b></span>`
      : `<span class="schip"><i style="background:#7C93FF"></i>Lectures <b>${fmtH(H * sp.lec)}</b></span><span class="schip"><i style="background:#34D3B1"></i>Practice <b>${fmtH(H * (sp.prac + sp.mock))}</b></span><span class="schip"><i style="background:#FFC554"></i>Revision <b>${fmtH(H * sp.rev)}</b></span>`;
    return `<div class="wk-row${dow === today ? ' today' : ''}"><span class="wk-d">${nm}${dow === today ? '<i>today</i>' : ''}</span><div class="wk-chips">${chips}</div></div>`;
  }).join('')}</div>`;
}
function renderPlanner() {
  const el = $('#view-planner');
  const p = pacing();
  if (!p) {

function mathRow(n, label, val, note) {
  return `<div class="mrow"><span class="mno">${n}</span><div class="mtx"><b>${label}</b><span class="tiny muted">${note}</span></div><span class="mval disp">${val}</span></div>`;
}
function paceMath(p) {
  const tgt = addDays(p.nearest.date, -p.buf);
  const sp = p.phase.split;
  const dbt = p.dbt;
  return `<div class="mathbox">
    ${mathRow(1, 'Work left', `${fmtN(p.remLect)} lect`,
      `${fmtN(p.remLect)} lectures × ${p.eff} min each = ${fmtH(p.remLect * p.eff / 60)} of watching`)}
    ${mathRow(2, 'Days to do it in', `${Math.max(1, p.nearest.days - p.buf)} d`,
      `${p.nearest.days} days to ${p.nearest.short} − ${p.buf}-day revision buffer → lectures must end ${fmtD(tgt)}`)}
    ${mathRow(3, 'Lecture hours needed', `${fmtH(p.needH)}/day`,
      `each subject is paced against its own deadline; shared subjects use the nearer exam`)}
    ${mathRow(4, 'Scale up by phase split', `${fmtH(p.totalNeeded)}/day`,
      `in ${p.phase.name}, lectures are only ${Math.round(sp.lec * 100)}% of a study day → ${fmtH(p.needH)} ÷ ${(sp.lec).toFixed(2)} = ${fmtH(p.totalNeeded)} total`)}
    ${mathRow(5, 'Adapt to what you actually did', `${p.adj >= 0 ? '+' : '−'}${fmtH(Math.abs(p.adj))}`,
      dbt.ready
        ? `planned ${fmtH(dbt.expected)} over ${dbt.days} days, you logged ${fmtH(dbt.logged)} → ${dbt.debt >= 0 ? `${fmtH(dbt.debt)} behind, spread over ${dbt.window} days` : `${fmtH(-dbt.debt)} ahead, credited back (capped at 1.5h)`}`
        : 'needs 3+ logged days before it kicks in')}
    <div class="mrow total"><span class="mno">=</span><div class="mtx"><b>Today's target</b><span class="tiny muted">recomputed every time you log, tick a lecture, or a day passes</span></div><span class="mval disp">${fmtH(p.adaptive)}</span></div>
  </div>
  <p class="tiny muted mt6">Study more than the plan and the number falls tomorrow — both because lectures left shrink and because the surplus is credited back. Study less and it climbs, so the deficit never quietly disappears. Your budget for comparison: ${fmtH(S.settings.hoursWk)} on weekdays, ${fmtH(S.settings.hoursWe)} on weekends (${fmtH(p.H)} average).</p>`;
}

/* ---------- Mocks ---------- */
function mockRows(list) {
  return `<div class="rows">${list.slice().reverse().map(m => {
    const s = pct(+m.score || 0, +m.total || 100) * 100;
    return `<div class="row mock-r"><span class="r-date">${fmtD(m.date)}</span>
      <span class="badge b-${m.exam}">${(m.exam || 'cse').toUpperCase()}</span>
      <span class="r-name">${esc(m.name || 'Mock')}</span>
      <span class="r-kv"><b>${+m.score || 0}</b> / ${+m.total || 100}</span>
      <span class="r-kv ${s >= 70 ? 'ok-t' : s < 45 ? 'bad-t' : ''}">${s.toFixed(0)}%</span>
      <span class="r-note muted">${esc(m.note || '')}</span>
      <span class="r-act"><button class="icon-btn" data-action="mock-del" data-id="${m.id}" aria-label="Delete mock">${icon('trash')}</button></span>
    </div>`; }).join('')}</div>`;
}
function renderMocks() {
  const el = $('#view-mocks');
  let list = S.mocks.slice().sort((a, b) => a.date < b.date ? -1 : 1);
  if (mockFilter !== 'all') list = list.filter(m => m.exam === mockFilter);
  const scores = list.map(m => pct(+m.score || 0, +m.total || 100) * 100);
  const best = scores.length ? Math.max(...scores) : 0;
  const avg = scores.length ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
  const last = scores.length ? scores[scores.length - 1] : 0;
  el.innerHTML = `<div class="vhead"><div><h1>Mocks</h1><p class="vsub">A mock without analysis is half a mock — log both.</p></div>
    <div class="vact"><button class="btn primary" data-action="mock-add">${icon('plus')} Add mock</button></div></div>
  <div class="grid">
    <div class="card pad c12">
      <div class="card-h">
        <div class="seg">${['all', 'cse', 'da'].map(f => `<button class="seg-b${mockFilter === f ? ' active' : ''}" data-action="mock-filter" data-f="${f}">${f === 'all' ? 'All' : f.toUpperCase()}</button>`).join('')}</div>
        <span class="mock-stats tiny muted">${scores.length ? `best <b>${best.toFixed(0)}%</b> · avg <b>${avg.toFixed(0)}%</b> · last <b>${last.toFixed(0)}%</b> · ${scores.length} test${scores.length === 1 ? '' : 's'}` : ''}</span>
      </div>
      ${list.length >= 2 ? mockChart(list)
        : list.length === 1 ? '<p class="small muted">One mock in — add another and the trend line appears.</p>'
        : `<div class="empty">${icon('gauge')}<b>No mocks yet.</b><span>Your first score is a baseline, not a verdict. Add it.</span></div>`}
    </div>
    ${list.length ? `<div class="card c12">${mockRows(list)}</div>` : ''}
  </div>`;
}

function openModal(html) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-back"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`;
  const back = root.firstElementChild;
  back.addEventListener('mousedown', e => { if (e.target === back) closeModal(); });
  const f = root.querySelector('input:not([type=hidden]),select');
  if (f) setTimeout(() => f.focus(), 40);
}

function planModal(pid) {

  const it = pid ? plan.items.find(x => x.id === pid) : null;
  const isAuto = !!(it && String(it.id).startsWith('a-'));
  openModal(`<div class="m-head"><span class="m-t">${it ? 'Edit task' : 'Add task'}</span><button class="icon-btn" data-action="modal-x" aria-label="Close">${icon('x')}</button></div>
  <form id="plan-form" data-pid="${it ? esc(it.id) : ''}">
    <div class="field"><label>Task</label><input class="input" name="text" required maxlength="90" value="${it ? esc(it.text) : ''}" placeholder="e.g. Rewatch OS deadlock lectures"></div>
    <div class="field"><label>Detail (optional)</label><input class="input" name="meta" maxlength="80" value="${it ? esc(it.meta || '') : ''}" placeholder="e.g. 1.5h · with notes"></div>

      ? `<p class="tiny muted">This is an auto-generated task — your edit applies to today only, and tomorrow's plan regenerates fresh.</p>`

let confirmCb = null;
function confirmModal(title, body, okLabel, cb, danger) {
  confirmCb = cb;
  openModal(`<div class="m-head"><span class="m-t">${title}</span><button class="icon-btn" data-action="modal-x" aria-label="Close">${icon('x')}</button></div>
  <p class="small" style="margin:2px 0 18px">${body}</p>
  <div class="m-foot"><button class="btn ghost" data-action="modal-x">Cancel</button><button class="btn ${danger ? 'danger' : 'primary'}" data-action="confirm-ok">${okLabel}</button></div>`);
}

let toastAct = null;
function toast(msg, action) {
  const root = $('#toast-root');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${msg}</span>${action ? `<button class="toast-b" data-action="toast-act">${action.label}</button>` : ''}`;
  if (action) toastAct = action.fn;
  root.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 320); }, 3800);
}

function markCompletion(s) {
  const done = (+s.total > 0) && (+s.done || 0) >= (+s.total || 0);
  if (done && !s.completedAt) s.completedAt = todayISO();
  if (!done) s.completedAt = null;
}

function bumpTodayLect(delta) {
  const t = todayISO();
  const l = S.logs[t] || (S.logs[t] = { hours: 0, lectures: 0, questions: 0, note: '' });
  l.lectures = Math.max(0, (+l.lectures || 0) + delta);
}

function doExport() {
  const blob = new Blob([JSON.stringify({ app: 'ascent-gate', version: 1, exportedAt: new Date().toISOString(), data: redactedState() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ascent-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 400);
  toast('Backup downloaded');
}

/* ---------- global event delegation ---------- */
document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const a = b.dataset.action;
  const card = b.closest('[data-id]');
  const id = card ? card.dataset.id : b.dataset.id;
  switch (a) {
    case 'nav': go(b.dataset.view); break;
    case 'theme-cycle': {
      const cur = document.documentElement.dataset.theme;
      S.settings.theme = cur === 'dark' ? 'light' : 'dark';
      applyTheme(); save();
      if (view === 'settings') renderSettings();
      break;
    }
    case 'dismiss-welcome': S.flags.welcome = false; save(); renderDashboard(); break;
    case 'plan-check': {
      const c = planChecksToday();
      c[b.dataset.pid] = b.checked; save();
      const li = b.closest('.plan-item'); if (li) li.classList.toggle('done', b.checked);
      break;
    }
    case 'plan-add': planModal(); break;
    case 'plan-edit': { const row = b.closest('[data-pid]'); if (row) planModal(row.dataset.pid); break; }
    case 'plan-del': {
      const row = b.closest('[data-pid]'); if (!row) break;
      const pid = row.dataset.pid;
      const store = freezePlan();
      const i = store.items.findIndex(x => x.id === pid); if (i < 0) break;
      const rm = store.items.splice(i, 1)[0];
      const ri = S.planRepeat.findIndex(r => r.id === pid);
      const rrm = ri >= 0 ? S.planRepeat.splice(ri, 1)[0] : null;
      save(); renderDashboard();
      toast(rrm ? 'Repeating task removed' : 'Task removed', { label: 'Undo', fn: () => {
        const st = freezePlan(); st.items.splice(i, 0, rm);
        if (rrm) S.planRepeat.splice(ri, 0, rrm);
        save(); if (view === 'dashboard') renderDashboard();
      } });
      break;
    }
    case 'plan-reset':
      delete S.planEdits[todayISO()]; save(); renderDashboard();
      toast('Back to the auto-plan' + (S.planRepeat.length ? ' (repeating tasks kept)' : ''));
      break;
    case 'sub-add': subjectModal(); break;
    case 'sub-edit': subjectModal(id); break;
    case 'sub-del': {
      const i = S.subjects.findIndex(x => x.id === id); if (i < 0) break;
      const rm = S.subjects.splice(i, 1)[0]; save(); renderSubjects();
      toast(`Deleted “${esc(rm.name)}”`, { label: 'Undo', fn: () => { S.subjects.splice(i, 0, rm); save(); if (view === 'subjects') renderSubjects(); } });
      break;
    }
    case 'sub-inc': case 'sub-dec': {
      const s = S.subjects.find(x => x.id === id); if (!s) break;
      const d = a === 'sub-inc' ? 1 : -1;
      const nd = clamp((+s.done || 0) + d, 0, +s.total || 0);
      if (nd !== +s.done) { s.done = nd; markCompletion(s); bumpTodayLect(d); save(); refreshSubjectCard(card, s); }
      break;
    }
    case 'rev-set': {
      const s = S.subjects.find(x => x.id === id); if (!s) break;
      const n = +b.dataset.n;
      const target = (+s.rev || 0) === n ? n - 1 : n;
      if (!Array.isArray(s.revHist)) s.revHist = [];
      while (s.revHist.length < target) s.revHist.push(todayISO());
      while (s.revHist.length > target) s.revHist.pop();
      s.rev = target;
      save(); renderSubjectList();
      break;
    }
    case 'rev-done': {
      const s = S.subjects.find(x => x.id === b.dataset.id); if (!s) break;
      markRevised(s); save(); renderDashboard();
      const r = revState(s);
      toast(`${esc(s.name)} revised — next pass ${r ? fmtD(r.due) : 'scheduled'}`);
      break;
    }
    case 'timer-start': {
      const sel = $('#timer-sub');
      startTimer(sel ? sel.value : '', clamp(+($('#timer-min') ? $('#timer-min').value : 50) || 50, 5, 180), 'work');
      break;
    }
    case 'timer-pause': pauseTimer(); break;
    case 'timer-resume': resumeTimer(); break;
    case 'timer-stop': stopTimer(); break;
    case 'ics': icsExport(); break;
    case 'share-card': shareCard(); break;
    case 'sync-link': syncLinkModal(); break;
    case 'sync-paste': syncPasteModal(); break;
    case 'sync-copy': {
      const ta = $('#sync-link'); if (!ta) break;
      ta.select();
      const done = () => toast('Link copied — send it to your other device');
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(ta.value).then(done, () => { try { document.execCommand('copy'); done(); } catch (e) { toast('Select the text and copy manually.'); } });
      else { try { document.execCommand('copy'); done(); } catch (e) { toast('Select the text and copy manually.'); } }
      break;
    }
    case 'sync-share': {
      const ta = $('#sync-link'); if (!ta || !navigator.share) break;
      navigator.share({ title: 'My Ascent study data', url: ta.value }).catch(() => {});
      break;
    }
    case 'sync-load': { const ta = $('#sync-paste'); if (ta) loadFromText(ta.value); break; }
    case 'gist-push': gistPush(); break;
    case 'gist-pull': gistPull(); break;
    case 'notify-ask': askNotify(); break;
    case 'weak-pick': b.classList.toggle('on'); break;
    case 'hm-mode': hmMode = b.dataset.v; hmOff = 0; if (view === 'log') renderLog(); else renderDashboard(); break;
    case 'hm-prev': hmOff--; if (view === 'log') renderLog(); else renderDashboard(); break;
    case 'hm-next': hmOff = Math.min(0, hmOff + 1); if (view === 'log') renderLog(); else renderDashboard(); break;
    case 'hm-day': {
      const dte = b.dataset.date;
      if (dte > todayISO()) { toast("That day hasn't happened yet."); break; }
      logEdit = dte; go('log'); window.scrollTo({ top: 0 });
      break;
    }
    case 'palette': openPalette(); break;
    case 'pal-run': {
      const c = commands().find(x => x.t === b.dataset.t);
      closeModal(); if (c) c.f();
      break;
    }
    case 'set-toggle': {
      const k = b.dataset.k;
      S.settings[k] = !S.settings[k];
      if (k === 'accentAuto') applyTheme();
      save(); renderSettings();
      break;
    }
    case 'sub-filter': subjFilter = b.dataset.f; renderSubjects(); break;
    case 'mock-add': mockModal(); break;
    case 'mock-filter': mockFilter = b.dataset.f; renderMocks(); break;
    case 'mock-del': {
      const i = S.mocks.findIndex(m => m.id === b.dataset.id); if (i < 0) break;
      const rm = S.mocks.splice(i, 1)[0]; save(); renderMocks();
      toast('Mock deleted', { label: 'Undo', fn: () => { S.mocks.splice(i, 0, rm); save(); if (view === 'mocks') renderMocks(); } });
      break;
    }
    case 'log-edit': logEdit = b.dataset.date; renderLog(); window.scrollTo({ top: 0, behavior: 'smooth' }); break;
    case 'log-cancel': logEdit = null; renderLog(); break;
    case 'log-del':
      confirmModal('Delete entry?', `Remove the log for <b>${fmtD(b.dataset.date)}</b>? This can't be undone.`, 'Delete',
        (date => () => { delete S.logs[date]; logEdit = null; save(); if (view === 'log') renderLog(); else renderDashboard(); })(b.dataset.date), true);
      break;
    case 'set-mode': S.settings.mode = b.dataset.v; whatIf = null; save(); renderSettings(); break;
    case 'set-theme': S.settings.theme = b.dataset.v; applyTheme(); save(); renderSettings(); break;
    case 'export': doExport(); break;
    case 'import': { const f = $('#import-file'); if (f) f.click(); break; }
    case 'reset':
      confirmModal('Reset everything?', 'All subjects, logs, mocks and settings will be wiped and defaults restored. Export a backup first if unsure.', 'Reset all',
        () => { S = defaultState(); save(); applyTheme(); go('dashboard'); toast('Fresh start — defaults restored.'); }, true);
      break;
    case 'confirm-ok': { const fn = confirmCb; confirmCb = null; closeModal(); if (fn) fn(); break; }
    case 'modal-x': closeModal(); break;
    case 'toast-act': { const fn = toastAct; toastAct = null; const t = b.closest('.toast'); if (t) t.remove(); if (fn) fn(); break; }
  }
});

document.addEventListener('change', e => {
  const el = e.target;
  if (el.id === 'import-file') {
    const file = el.files && el.files[0]; el.value = '';
    if (!file) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const j = JSON.parse(rd.result);
        const d = j && j.app === 'ascent-gate' && j.data ? j.data : (j && j.subjects && j.settings ? j : null);
        if (!d) throw new Error('shape');
        confirmModal('Import backup?', 'This replaces everything currently in the tracker with the backup contents.', 'Import', () => {
          const base = defaultState();
          const keepToken = (S.settings.gist && S.settings.gist.token) || '';
          S = { v: 1,
            settings: Object.assign(base.settings, d.settings || {}),
            subjects: Array.isArray(d.subjects) ? d.subjects : base.subjects,
            logs: d.logs || {}, mocks: Array.isArray(d.mocks) ? d.mocks : [],
            planChecks: d.planChecks || {}, flags: Object.assign(base.flags, d.flags || {}, { welcome: false }) };
          if (!S.settings.gist.token) S.settings.gist.token = keepToken;
          save(); applyTheme(); go('dashboard'); toast('Backup imported');
        });
      } catch (err) { toast("That file isn't a valid Ascent backup."); }
    };
    rd.readAsText(file);
    return;
  }
  const a = el.dataset.action; if (!a) return;
  const cardEl = el.closest('[data-id]');
  const id = cardEl ? cardEl.dataset.id : null;
  if (a === 'sub-set') {
    const s = S.subjects.find(x => x.id === id); if (!s) return;
    const v = clamp(Math.round(+el.value || 0), 0, +s.total || 0);
    const delta = v - (+s.done || 0);
    s.done = v; markCompletion(s);
    if (delta) bumpTodayLect(delta);
    save(); refreshSubjectCard(cardEl, s);
  } else if (a === 'pyq-set') {
    const s = S.subjects.find(x => x.id === id); if (!s) return;
    s.pyqDone = Math.max(0, Math.round(+el.value || 0));
    el.value = s.pyqDone; save();
    const ss = $('#subj-substats'); if (ss) ss.textContent = subjSubText();
  } else if (a === 'sub-sort') { subjSort = el.value; renderSubjectList(); }
  else if (a === 'set-date') { if (el.value) { S.settings[el.dataset.k] = el.value; whatIf = null; save(); } else el.value = S.settings[el.dataset.k]; }
  else if (a === 'set-rev') {
    const i = +el.dataset.i;
    const arr = revIntervals().slice();
    arr[i] = clamp(Math.round(+el.value || 1), 1, 240);
    S.settings.revInts = arr; el.value = arr[i]; save();
  }
  else if (a === 'set-gist') {
    S.settings.gist = S.settings.gist || { token: '', id: '', last: '' };
    S.settings.gist[el.dataset.k] = String(el.value || '').trim();
    save();
  }
  else if (a === 'set-num') {
    const k = el.dataset.k; let v = +el.value;
    if (k === 'buffer') v = clamp(Math.round(v || 0), 0, 120);
    if (k === 'effMin') v = clamp(Math.round(v || 55), 15, 240);
    S.settings[k] = v; el.value = v; whatIf = null; save();
  }
});

document.addEventListener('input', e => {
  const el = e.target;
  if (el.dataset.action === 'set-hours') {
    const k = el.dataset.k || 'hoursWk';
    S.settings[k] = +el.value;
    S.settings.dailyHours = avgDailyHours();
    const v = $(k === 'hoursWe' ? '#hwe-v' : '#hwk-v'); if (v) v.textContent = fmtH(+el.value);
    whatIf = null; save();
  }
});

document.addEventListener('submit', e => {
  const f = e.target; e.preventDefault();
  if (f.id === 'quick-log' || f.id === 'log-form') {
    const fd = new FormData(f);
    const date = f.id === 'quick-log' ? todayISO() : (String(fd.get('date') || '') || todayISO());
    const entry = {
      hours: clamp(+fd.get('hours') || 0, 0, 24),
      lectures: Math.max(0, Math.round(+fd.get('lectures') || 0)),
      questions: Math.max(0, Math.round(+fd.get('questions') || 0)),
      note: String(fd.get('note') || '').slice(0, 160),
    };
    if (!entry.hours && !entry.lectures && !entry.questions && !entry.note) { toast('Nothing to save — add hours, lectures or questions.'); return; }
    S.logs[date] = entry; logEdit = null; save();
    toast(`Saved ${fmtD(date)}`);
    if (view === 'dashboard') renderDashboard(); else if (view === 'log') renderLog();
  }
  else if (f.id === 'subject-form') {
    const fd = new FormData(f);
    const name = String(fd.get('name') || '').trim();
    if (!name) { toast('Give the subject a name.'); return; }
    const total = clamp(Math.round(+fd.get('total') || 0), 1, 999);
    const obj = {
      name, exam: String(fd.get('exam') || 'both'), total,
      done: clamp(Math.round(+fd.get('done') || 0), 0, total),
      wc: clamp(Math.round(+fd.get('wc') || 0), 0, 100),
      wd: clamp(Math.round(+fd.get('wd') || 0), 0, 100),
      pyqTotal: Math.max(0, Math.round(+fd.get('pyqTotal') || 0)),
      pyqDone: Math.max(0, Math.round(+fd.get('pyqDone') || 0)),
    };
    const sid = f.dataset.id;
    if (sid) { const s = S.subjects.find(x => x.id === sid); if (s) Object.assign(s, obj); }
    else S.subjects.push(Object.assign({ id: uid(), rev: 0, color: PALETTE[S.subjects.length % PALETTE.length] }, obj));
    save(); closeModal(); renderSubjects();
    toast(sid ? 'Subject updated' : `Added “${esc(name)}”`);
  }
  else if (f.id === 'plan-form') {
    const fd = new FormData(f);
    const text = String(fd.get('text') || '').trim();
    if (!text) { toast('Give the task a name.'); return; }
    const meta = String(fd.get('meta') || '').trim().slice(0, 80);
    const rep = fd.get('repeat') != null;
    const pid = f.dataset.pid;
    const store = freezePlan();
    if (pid) {
      const it = store.items.find(x => x.id === pid);
      if (it) { it.text = text; it.meta = meta; }
      const ri = S.planRepeat.findIndex(r => r.id === pid);
      if (rep) {
        if (ri >= 0) Object.assign(S.planRepeat[ri], { text, meta });
        else { S.planRepeat.push({ id: pid, ic: (it && it.ic) || 'check', text, meta }); }
        if (it) it.repeat = true;
      } else if (ri >= 0) { S.planRepeat.splice(ri, 1); if (it) it.repeat = false; }
    } else {
      const item = { id: (rep ? 'rep-' : 'c-') + uid(), ic: 'check', text, meta, repeat: rep };
      store.items.push(item);
      if (rep) S.planRepeat.push({ id: item.id, ic: 'check', text, meta });
    }
    save(); closeModal(); renderDashboard();
    toast(pid ? 'Task updated' : 'Task added');
  }
  else if (f.id === 'mock-form') {
    const fd = new FormData(f);
    const weak = $$('#mk-weak .rev-chip.on').map(x => x.dataset.weak);
    const att = Math.max(0, Math.round(+fd.get('attempted') || 0));
    S.mocks.push({
      id: uid(), date: String(fd.get('date') || todayISO()),
      exam: String(fd.get('exam') || 'cse'),
      name: String(fd.get('name') || '').trim() || 'Mock',
      score: +fd.get('score') || 0,
      total: Math.max(1, +fd.get('total') || 100),
      attempted: att,
      correct: clamp(Math.round(+fd.get('correct') || 0), 0, att || 65),
      weak,
      note: String(fd.get('note') || '').slice(0, 180),
    });
    save(); closeModal(); renderMocks();
    toast('Mock logged — now do the analysis.');
  }
});

/* ---------- theme ---------- */
const mq = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
function applyTheme() {
  const t = S.settings.theme;
  const resolved = t === 'system' ? (mq && mq.matches ? 'dark' : 'light') : t;
  document.documentElement.dataset.theme = resolved;
  applyAccent();
  const m = $('#meta-theme'); if (m) m.content = resolved === 'dark' ? '#0B0E17' : '#F3F5FB';
  $$('.theme-btn').forEach(b => { b.innerHTML = icon(resolved === 'dark' ? 'sun' : 'moon'); });
}
if (mq && mq.addEventListener) mq.addEventListener('change', () => { if (S.settings.theme === 'system') applyTheme(); });

/* Accent warms as the exam approaches: Foundation indigo → Final Sprint rose. */
function applyAccent() {
  const root = document.documentElement.style;
  const ex = upcomingExams();
  if (!S.settings.accentAuto || !ex.length) { root.removeProperty('--acc'); root.removeProperty('--acc2'); return; }
  const ph = phaseFor(ex[0].days);
  const pair = { 'Foundation': ['#7C93FF', '#5EC8F2'], 'Core Learning': ['#5EC8F2', '#34D3B1'],
                 'Consolidation': ['#34D3B1', '#8FD16E'], 'Intensive Practice': ['#FFC554', '#F0916B'],
                 'Final Sprint': ['#FF8FB1', '#FFC554'] }[ph.name] || ['#7C93FF', '#5EC8F2'];
  root.setProperty('--acc', pair[0]);
  root.setProperty('--acc2', pair[1]);

/* ============================================================
   Intelligence engines — revision, debt, readiness, ROI, rank
   ============================================================ */

/* ---------- spaced repetition ---------- */
function revIntervals() { const a = S.settings.revInts; return Array.isArray(a) && a.length ? a : [7, 21, 60]; }
function revState(s) {
  if (!(+s.total > 0) || (+s.done || 0) < (+s.total || 0)) return null;   // only completed subjects
  const hist = Array.isArray(s.revHist) ? s.revHist.slice().sort() : [];
  const anchor = hist.length ? hist[hist.length - 1] : (s.completedAt || todayISO());
  const ints = revIntervals();
  const gap = hist.length < ints.length ? ints[hist.length] : (+S.settings.revRepeat || 45);
  const due = addDays(anchor, gap);
  return { pass: hist.length + 1, due, dueIn: daysUntil(due), last: hist.length ? hist[hist.length - 1] : null, anchor, gap };
}
function revDue() {
  return activeSubjects().map(s => ({ s, r: revState(s) }))
    .filter(x => x.r && x.r.dueIn <= 0)
    .sort((a, b) => a.r.dueIn - b.r.dueIn);
}
function revUpcoming() {
  return activeSubjects().map(s => ({ s, r: revState(s) }))
    .filter(x => x.r).sort((a, b) => a.r.dueIn - b.r.dueIn);
}
function markRevised(s) {
  if (!Array.isArray(s.revHist)) s.revHist = [];
  s.revHist.push(todayISO());
  s.rev = s.revHist.length;
}

/* ---------- study debt ---------- */
function trackStart() {
  const ks = Object.keys(S.logs).filter(hasLog).sort();
  return ks.length ? ks[0] : todayISO();
}
function debtState() {
  const start = trackStart(), t = todayISO();
  if (start === t) return { days: 0, expected: 0, logged: 0, debt: 0, perDay: 0, ready: false };
  let expected = 0, logged = 0, days = 0;
  for (let d = parseISO(start); isoOf(d) < t; d = new Date(d.getTime() + DAY)) {
    const iso = isoOf(d);
    expected += hoursFor(d);
    logged += (S.logs[iso] && +S.logs[iso].hours) || 0;
    days++;
  }
  const debt = expected - logged;                 // + = behind, − = ahead
  const window = 14;
  return { days, expected, logged, debt, perDay: debt / window, window, ready: days >= 3,
           adherence: expected > 0 ? logged / expected : 1 };
}

/* ---------- readiness score ---------- */
function weightedPyq(k) {
  let W = 0, acc = 0;
  for (const s of subjectsForExam(k)) {
    const w = k === 'cse' ? +s.wc || 0 : +s.wd || 0;
    if (w <= 0 || !(+s.pyqTotal > 0)) continue;
    W += w; acc += w * pct(+s.pyqDone || 0, +s.pyqTotal);
  }
  return W > 0 ? acc / W : 0;
}
function mockForm(k) {
  const list = S.mocks.filter(m => !k || m.exam === k).sort((a, b) => a.date < b.date ? -1 : 1).slice(-3);
  if (!list.length) return null;
  return list.reduce((a, m) => a + pct(+m.score || 0, +m.total || 100), 0) / list.length;
}
function revisionHealth() {
  const done = activeSubjects().filter(s => +s.total > 0 && (+s.done || 0) >= (+s.total || 0));
  if (!done.length) return 0;
  let acc = 0;
  for (const s of done) {
    const r = revState(s);
    const passes = Math.min(3, (Array.isArray(s.revHist) ? s.revHist.length : +s.rev || 0)) / 3;
    const overdue = r && r.dueIn < 0 ? clamp(1 + r.dueIn / 30, 0, 1) : 1;   // decay when overdue
    acc += passes * .6 + overdue * .4 * (passes > 0 ? 1 : 0);
  }
  return clamp(acc / done.length, 0, 1);
}
function consistency() {
  const p = recentPace(14);
  const target = avgDailyHours();
  return target > 0 ? clamp(p.hrsPerDay / target, 0, 1) : 0;
}
function readiness() {
  const ks = activeExamKeys();
  const cov = ks.reduce((a, k) => a + weightedProgress(k), 0) / ks.length;
  const pyq = ks.reduce((a, k) => a + weightedPyq(k), 0) / ks.length;
  const mf = ks.map(k => mockForm(k)).filter(x => x != null);
  const mock = mf.length ? mf.reduce((a, b) => a + b, 0) / mf.length : null;
  const rev = revisionHealth();
  const con = consistency();
  const parts = [
    { key: 'cov',  label: 'Syllabus coverage', w: .35, v: cov,  hint: 'weighted lectures done' },
    { key: 'pyq',  label: 'PYQ depth',         w: .25, v: pyq,  hint: 'weighted past-paper questions solved' },
    { key: 'mock', label: 'Mock performance',  w: .20, v: mock == null ? 0 : mock, hint: mock == null ? 'no mocks logged yet' : 'average of last 3 mocks' },
    { key: 'rev',  label: 'Revision health',   w: .10, v: rev,  hint: 'passes done & how overdue they are' },
    { key: 'con',  label: 'Consistency',       w: .10, v: con,  hint: 'last 14 days vs your target hours' },
  ];
  const score = parts.reduce((a, p) => a + p.w * p.v, 0) * 100;
  const gap = parts.slice().sort((a, b) => (b.w * (1 - b.v)) - (a.w * (1 - a.v)))[0];
  return { score, parts, gap, hasMocks: mock != null };
}

/* ---------- ROI: marks per remaining hour ---------- */
function subjectMarks(s) {
  const m = S.settings.mode;
  if (m === 'cse') return +s.wc || 0;
  if (m === 'da')  return +s.wd || 0;
  return (+s.wc || 0) + (+s.wd || 0);
}
function roiList() {
  const eff = +S.settings.effMin || 55;
  return activeSubjects().map(s => {
    const lecH = Math.max(0, (+s.total || 0) - (+s.done || 0)) * eff / 60;
    const pyqLeft = Math.max(0, (+s.pyqTotal || 0) - (+s.pyqDone || 0));
    const pyqH = pyqLeft * 4 / 60;                    // ~4 min per PYQ incl. analysis
    const remH = lecH + pyqH;
    const marks = subjectMarks(s);
    const banked = marks * pct(s.done, s.total);
    const left = marks - banked;
    return { s, marks, banked, left, lecH, pyqH, remH, roi: remH > 0 ? left / remH : Infinity, done: remH <= 0 };
  }).sort((a, b) => (b.roi === Infinity ? -1 : a.roi === Infinity ? 1 : b.roi - a.roi));
}

/* ---------- score → GATE score & rank (rough heuristic) ---------- */
const RANK_TABLE = [[90,20],[85,50],[80,110],[75,220],[70,420],[65,700],[60,1200],[55,2000],[50,3300],[45,5200],[40,8200],[35,13000],[30,20000],[25,32000],[20,50000]];
function rankFor(marks, exam) {
  const t = RANK_TABLE;
  let r;
  if (marks >= t[0][0]) r = t[0][1];
  else if (marks <= t[t.length - 1][0]) r = t[t.length - 1][1];
  else {
    for (let i = 0; i < t.length - 1; i++) {
      if (marks <= t[i][0] && marks >= t[i + 1][0]) {
        const f = (marks - t[i + 1][0]) / (t[i][0] - t[i + 1][0]);
        r = Math.round(t[i + 1][1] + f * (t[i][1] - t[i + 1][1]));
        break;
      }
    }
  }
  if (exam === 'da') r = Math.max(3, Math.round(r * .18));   // much smaller candidate pool
  return r;
}
function gateScore(marks) {
  const Mq = 28, Mt = 85;
  return clamp(Math.round(350 + 650 * (marks - Mq) / (Mt - Mq)), 0, 1000);
}
function projection3(k) {
  const list = S.mocks.filter(m => m.exam === k).sort((a, b) => a.date < b.date ? -1 : 1);
  if (!list.length) return null;
  const last3 = list.slice(-3).map(m => pct(+m.score || 0, +m.total || 100) * 100);
  const marks = last3.reduce((a, b) => a + b, 0) / last3.length;
  const trend = list.length >= 2
    ? (pct(list[list.length - 1].score, list[list.length - 1].total) - pct(list[0].score, list[0].total)) * 100 : 0;
  return { marks, trend, n: list.length, rank: rankFor(marks, k), gs: gateScore(marks),
           lo: rankFor(Math.min(100, marks + 8), k), hi: rankFor(Math.max(0, marks - 8), k) };
}
function accuracyStats(k) {
  const list = S.mocks.filter(m => (!k || m.exam === k) && (+m.attempted || 0) > 0);
  if (!list.length) return null;
  let att = 0, cor = 0;
  list.forEach(m => { att += +m.attempted || 0; cor += +m.correct || 0; });
  const acc = att > 0 ? cor / att : 0;
  const wrong = att - cor;
  return { att, cor, wrong, acc, n: list.length, negLoss: wrong * (1 / 3) };
}
function weakSubjects() {
  const cnt = {};
  S.mocks.slice(-6).forEach(m => (m.weak || []).forEach(id => { cnt[id] = (cnt[id] || 0) + 1; }));
  return Object.keys(cnt).map(id => ({ s: S.subjects.find(x => x.id === id), n: cnt[id] }))
    .filter(x => x.s && subjectVisible(x.s)).sort((a, b) => b.n - a.n);
}

/* ---------- two-paper overlap optimizer ---------- */
function overlap() {
  if (S.settings.mode !== 'both') return null;
  const ex = upcomingExams();
  if (ex.length < 2) return null;
  const p = pacing(); if (!p) return null;
  const eff = p.eff;
  const rem = arr => arr.reduce((a, s) => a + Math.max(0, (+s.total || 0) - (+s.done || 0)), 0) * eff / 60;
  const shared = rem(S.subjects.filter(s => s.exam === 'both'));
  const cseOnly = rem(S.subjects.filter(s => s.exam === 'cse'));
  const daOnly = rem(S.subjects.filter(s => s.exam === 'da'));
  const dC = p.dEff.cse, dD = p.dEff.da;
  const cseAlone = (shared + cseOnly) / dC;
  const daAlone = (shared + daOnly) / dD;
  const both = p.needH;
  const lec = p.phase.split.lec;
  const totalBoth = lec > 0 ? both / lec : both;
  const totalCse = lec > 0 ? cseAlone / lec : cseAlone;
  const totalDa = lec > 0 ? daAlone / lec : daAlone;
  const totalRem = shared + cseOnly + daOnly;
  return { shared, cseOnly, daOnly, cseAlone, daAlone, both, totalBoth, totalCse, totalDa,
           costOfDA: totalBoth - totalCse, costOfCSE: totalBoth - totalDa,
           sharePct: totalRem > 0 ? shared / totalRem : 0, totalRem };
}

/* ---------- burn-down series ---------- */
function burndown() {
  const p = pacing(); if (!p) return null;
  const t = todayISO();
  const start = trackStart();
  const target = addDays(p.nearest.date, -p.buf);
  const curRem = p.remLect;
  const pts = [];
  let acc = 0;
  const days = [];
  for (let d = parseISO(start); isoOf(d) <= t; d = new Date(d.getTime() + DAY)) days.push(isoOf(d));
  for (let i = days.length - 1; i >= 0; i--) {
    const iso = days[i];
    pts.unshift({ iso, rem: curRem + acc });
    acc += (S.logs[iso] && +S.logs[iso].lectures) || 0;
  }
  const startRem = pts.length ? pts[0].rem : curRem;
  const pace = recentPace(14);
  const proj = pace.lectPerDay > 0 ? Math.ceil(curRem / pace.lectPerDay) : null;
  const projEnd = proj != null ? addDays(t, proj) : null;
  return { pts, start, today: t, target, startRem, curRem, projEnd, proj, examDate: p.nearest.date, exam: p.nearest.short };
}

/* ============================================================
   Focus timer (auto-logging Pomodoro)
   ============================================================ */
let timerT = null;
function timerState() { return S.timer; }
function timerRemain() {
  const t = S.timer; if (!t) return 0;
  if (t.paused) return t.left;
  return Math.max(0, Math.round((t.endsAt - Date.now()) / 1000));
}
function startTimer(sid, mins, mode) {
  S.timer = { sid: sid || '', mins, mode: mode || 'work', endsAt: Date.now() + mins * 60000, paused: false, left: mins * 60 };
  save(); runTimer(); renderTimer();
}
function pauseTimer() {
  const t = S.timer; if (!t || t.paused) return;
  t.left = timerRemain(); t.paused = true; save(); renderTimer();
}
function resumeTimer() {
  const t = S.timer; if (!t || !t.paused) return;
  t.endsAt = Date.now() + t.left * 1000; t.paused = false; save(); runTimer(); renderTimer();
}
function stopTimer(silent) {
  const t = S.timer;
  if (t && t.mode === 'work') {
    const done = t.mins * 60 - timerRemain();
    if (done >= 300) { logFocus(t.sid, Math.round(done / 60)); if (!silent) toast(`Logged ${Math.round(done / 60)} min of focus`); }
  }
  S.timer = null; clearInterval(timerT); save(); renderTimer();
  if (view === 'dashboard') renderDashboard();
}
function logFocus(sid, mins) {
  const t = todayISO();
  const l = S.logs[t] || (S.logs[t] = { hours: 0, lectures: 0, questions: 0, note: '' });
  l.hours = Math.round(((+l.hours || 0) + mins / 60) * 100) / 100;
  if (sid) { l.bySub = l.bySub || {}; l.bySub[sid] = (+l.bySub[sid] || 0) + mins; }
  save();
}
function runTimer() {
  clearInterval(timerT);
  timerT = setInterval(() => {
    const t = S.timer;
    if (!t || t.paused) return;
    if (timerRemain() <= 0) {
      const wasWork = t.mode === 'work';
      if (wasWork) logFocus(t.sid, t.mins);
      const sub = t.sid ? S.subjects.find(x => x.id === t.sid) : null;
      notify(wasWork ? 'Focus block done' : 'Break over',
             wasWork ? `${t.mins} min logged${sub ? ' · ' + sub.name : ''}. Take a ${S.settings.pomoBreak || 10} min break.` : 'Back to it.');
      S.timer = null; clearInterval(timerT); save();
      toast(wasWork ? `${t.mins} min logged — break time.` : 'Break over — back in.');
      if (view === 'dashboard') renderDashboard(); else renderTimer();
      return;
    }
    renderTimer();
  }, 1000);
}
function fmtMS(s) { return Math.floor(s / 60) + ':' + pad2(s % 60); }
function renderTimer() {
  const el = $('#timer-face'); if (!el) return;
  const t = S.timer;
  el.textContent = t ? fmtMS(timerRemain()) : fmtMS((+S.settings.pomoWork || 50) * 60);
  const ring = $('#timer-ring');
  if (ring && t) {
    const total = t.mins * 60, left = timerRemain();
    const c = 2 * Math.PI * 52;
    ring.style.strokeDasharray = c.toFixed(1);
    ring.style.strokeDashoffset = (c * (1 - left / total)).toFixed(1);
  } else if (ring) { ring.style.strokeDashoffset = '0'; }
  const b = $('#timer-btns');
  if (b) {
    b.innerHTML = !t
      ? `<button class="btn primary" data-action="timer-start">${icon('play')} Start focus block</button>`
      : `${t.paused ? `<button class="btn primary" data-action="timer-resume">${icon('play')} Resume</button>`
                    : `<button class="btn" data-action="timer-pause">${icon('minus')} Pause</button>`}
         <button class="btn danger ghost" data-action="timer-stop">Stop &amp; log</button>`;
  }
}

/* ============================================================
   Notifications
   ============================================================ */
function notify(title, body) {
  if (!S.settings.notify || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
  try { new Notification(title, { body, icon: undefined, tag: 'ascent' }); } catch (e) {}
}
function askNotify() {
  if (typeof Notification === 'undefined') { toast('This browser has no notification support.'); return; }
  Notification.requestPermission().then(p => {
    S.settings.notify = p === 'granted'; save();
    toast(p === 'granted' ? 'Notifications on — mock days and revisions will nudge you.' : 'Notifications blocked in browser settings.');
    if (view === 'settings') renderSettings();
  });
}
function dailyNudge() {
  if (!S.settings.notify) return;
  const t = todayISO();
  if (S.flags.notified === t) return;
  const p = pacing(); if (!p) return;
  const due = revDue();
  const isMockDay = (MOCK_DAYS[p.phase.mocksWk] || []).includes(new Date().getDay());
  const bits = [];
  if (isMockDay) bits.push(`Mock day — ${p.phase.mockType}`);
  if (due.length) bits.push(`${due.length} subject${due.length > 1 ? 's' : ''} due for revision`);
  if (!hasLog(t)) bits.push(`${fmtH(hoursToday())} on the plan today`);
  if (!bits.length) return;
  S.flags.notified = t; save();
  notify(`${p.nearest.days} days to ${p.nearest.label}`, bits.join(' · '));
}

/* ============================================================
   Calendar (.ics) export
   ============================================================ */
function icsExport() {
  const p = pacing();
  if (!p) { toast('Set an exam date first.'); return; }
  const stamp = new Date().toISOString().replace(/[-:.]/g, '').slice(0, 15) + 'Z';
  const dt = iso => iso.replace(/-/g, '');
  const L = ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Ascent//GATE Tracker//EN', 'CALSCALE:GREGORIAN'];
  const ev = (uidx, start, end, sum, desc) => {
    L.push('BEGIN:VEVENT', `UID:${uidx}@ascent`, `DTSTAMP:${stamp}`,
      `DTSTART;VALUE=DATE:${dt(start)}`, `DTEND;VALUE=DATE:${dt(addDays(end, 1))}`,
      `SUMMARY:${sum.replace(/[,;]/g, ' ')}`, `DESCRIPTION:${(desc || '').replace(/[,;]/g, ' ')}`, 'END:VEVENT');
  };
  activeExams().forEach(e => ev('exam-' + e.key, e.date, e.date, `${e.label} — exam day`, 'Ascent'));
  const t = todayISO();
  for (let i = 0; i < 60; i++) {
    const iso = addDays(t, i);
    const d = parseISO(iso);
    const days = daysUntil(p.nearest.date);
    if (days - i < 0) break;
    const ph = phaseFor(days - i);
    const H = hoursFor(d);
    const sp = ph.split;
    const isMock = (MOCK_DAYS[ph.mocksWk] || []).includes(d.getDay());
    if (isMock) ev('mock-' + iso, iso, iso, `Mock: ${ph.mockType} (${p.nearest.short})`, `Full analysis same day · ${ph.name} phase`);
    ev('study-' + iso, iso, iso, `Study ${fmtH(H)} — ${ph.name}`,
       `Lectures ${fmtH(H * sp.lec)} · Practice ${fmtH(H * sp.prac)} · Revision ${fmtH(H * sp.rev)} · Mocks ${fmtH(H * sp.mock)}`);
  }
  revUpcoming().filter(x => x.r.dueIn >= 0 && x.r.dueIn <= 90).forEach(x =>
    ev('rev-' + x.s.id + x.r.due, x.r.due, x.r.due, `Revision ${x.r.pass}: ${x.s.name}`, 'Spaced repetition — Ascent'));
  L.push('END:VCALENDAR');
  const blob = new Blob([L.join('\r\n')], { type: 'text/calendar' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `ascent-schedule-${t}.ics`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 400);
  toast('Calendar exported — import it into Google Calendar');
}

                 files: { 'ascent.json': { content: JSON.stringify({ app: 'ascent-gate', version: 1, exportedAt: new Date().toISOString(), data: redactedState() }, null, 1) } } };
  try {
    const r = await fetch(g.id ? `${GH}/gists/${g.id}` : `${GH}/gists`,
      { method: g.id ? 'PATCH' : 'POST', headers: ghHead(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    S.settings.gist.id = j.id;
    S.settings.gist.last = new Date().toISOString();
    save();
    toast('Synced up to your private gist');
    if (view === 'settings') renderSettings();
  } catch (e) { toast('Sync failed — check the token (needs "gist" scope) and try again.'); }
}
async function gistPull() {
  const g = S.settings.gist;
  if (!g.token || !g.id) { toast('Push once first, or paste an existing gist ID.'); return; }
  try {
    const r = await fetch(`${GH}/gists/${g.id}`, { headers: ghHead() });
    if (!r.ok) throw new Error(r.status);
    const j = await r.json();
    const f = j.files && j.files['ascent.json'];
    if (!f) throw new Error('no file');
    const parsed = JSON.parse(f.content);
    const d = parsed && parsed.data ? parsed.data : parsed;
    confirmModal('Pull from gist?', 'This replaces everything on this device with the synced copy.', 'Pull & replace', () => {
      const base = defaultState();
      const keepGist = S.settings.gist;
      S = { v: 1,
        settings: Object.assign(base.settings, d.settings || {}, { gist: keepGist }),
        subjects: Array.isArray(d.subjects) ? d.subjects : base.subjects,
        logs: d.logs || {}, mocks: Array.isArray(d.mocks) ? d.mocks : [],
        planChecks: d.planChecks || {}, planEdits: d.planEdits || {}, planRepeat: d.planRepeat || [],
        timer: null, flags: Object.assign(base.flags, d.flags || {}, { welcome: false }) };
      save(); applyTheme(); go('dashboard'); toast('Pulled from gist — this device is up to date.');
    });
  } catch (e) { toast('Pull failed — check the token and gist ID.'); }
}

let palIdx = 0;
function openPalette() {
  openModal(`<div class="pal">
    <input class="input pal-in" id="pal-q" placeholder="Type a command…" autocomplete="off">
    <div class="pal-list" id="pal-list"></div>
    <div class="tiny muted pal-foot">↑↓ to move · ↵ to run · esc to close</div>
  </div>`);
  const q = $('#pal-q');
  const draw = () => {
    const s = q.value.trim().toLowerCase();
    const list = commands().filter(c => !s || (c.t + ' ' + c.k).toLowerCase().includes(s));
    palIdx = clamp(palIdx, 0, Math.max(0, list.length - 1));
    $('#pal-list').innerHTML = list.length
      ? list.map((c, i) => `<button class="pal-i${i === palIdx ? ' on' : ''}" data-action="pal-run" data-t="${esc(c.t)}">${esc(c.t)}</button>`).join('')
      : '<div class="pal-i muted">No command matches.</div>';
  };
  q.addEventListener('input', () => { palIdx = 0; draw(); });
  q.addEventListener('keydown', e => {
    const list = commands().filter(c => { const s = q.value.trim().toLowerCase(); return !s || (c.t + ' ' + c.k).toLowerCase().includes(s); });
    if (e.key === 'ArrowDown') { e.preventDefault(); palIdx = (palIdx + 1) % Math.max(1, list.length); draw(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); palIdx = (palIdx - 1 + list.length) % Math.max(1, list.length); draw(); }
    else if (e.key === 'Enter') { e.preventDefault(); const c = list[palIdx]; if (c) { closeModal(); c.f(); } }
  });
  draw();
}
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); return; }
  if (e.target && /input|select|textarea/i.test(e.target.tagName)) return;
  if (e.key === '/') { e.preventDefault(); openPalette(); }
  const map = { d: 'dashboard', s: 'subjects', p: 'planner', i: 'insights', l: 'log', m: 'mocks', ',': 'settings' };
  if (!e.metaKey && !e.ctrlKey && !e.altKey && map[e.key.toLowerCase()]) go(map[e.key.toLowerCase()]);
});

function burnChart(b) {
  const w = 760, h = 260, pl = 46, pr = 18, pt = 16, pb = 30;
  const t0 = parseISO(b.start).getTime();
  const endIso = (b.projEnd && parseISO(b.projEnd) > parseISO(b.target)) ? b.projEnd : b.target;
  const t1 = Math.max(parseISO(endIso).getTime(), parseISO(b.today).getTime() + DAY);
  const ymax = Math.max(10, b.startRem);
  const X = iso => pl + (w - pl - pr) * clamp((parseISO(iso).getTime() - t0) / Math.max(1, t1 - t0), 0, 1);
  const Y = v => pt + (h - pt - pb) * (1 - clamp(v / ymax, 0, 1));
  let grid = '';
  for (let g = 0; g <= 4; g++) {
    const v = ymax * g / 4, y = Y(v);
    grid += `<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w - pr}" y2="${y.toFixed(1)}" class="mg"/><text x="${pl - 7}" y="${(y + 3).toFixed(1)}" text-anchor="end" class="mct">${Math.round(v)}</text>`;
  }
  const ideal = `M${X(b.start).toFixed(1)},${Y(b.startRem).toFixed(1)} L${X(b.target).toFixed(1)},${Y(0).toFixed(1)}`;
  const act = b.pts.map(p => `${X(p.iso).toFixed(1)},${Y(p.rem).toFixed(1)}`).join(' ');
  const projLine = b.projEnd
    ? `<line x1="${X(b.today).toFixed(1)}" y1="${Y(b.curRem).toFixed(1)}" x2="${X(b.projEnd).toFixed(1)}" y2="${Y(0).toFixed(1)}" class="bd-proj"/>` : '';
  const tgtX = X(b.target);
  return `<svg class="mockchart" viewBox="0 0 ${w} ${h}" role="img" aria-label="Burn-down chart">
    ${grid}
    <line x1="${tgtX.toFixed(1)}" y1="${pt}" x2="${tgtX.toFixed(1)}" y2="${h - pb}" class="bd-tgt"/>
    <text x="${(tgtX - 6).toFixed(1)}" y="${pt + 12}" text-anchor="end" class="mct">lectures must end · ${fmtD(b.target)}</text>
    <path d="${ideal}" class="bd-ideal"/>
    ${projLine}
    <polyline points="${act}" class="ml"/>
    <circle cx="${X(b.today).toFixed(1)}" cy="${Y(b.curRem).toFixed(1)}" r="5" class="md cse"/>
    <text x="${pl}" y="${h - 8}" class="mct">${fmtD(b.start)}</text>
    <text x="${w - pr}" y="${h - 8}" text-anchor="end" class="mct">${fmtD(endIso)}</text>
  </svg>
  <div class="frow g8 wrap tiny muted mt6">
    <span class="schip"><i style="background:var(--acc)"></i>actual lectures left</span>
    <span class="schip"><i style="background:var(--faint)"></i>ideal pace</span>
    ${b.projEnd ? `<span class="schip"><i style="background:var(--warn)"></i>your 14-day pace → ${fmtD(b.projEnd)}</span>` : ''}
  </div>`;
}

function readyGauge(score) {
  const r = 66, c = 2 * Math.PI * r;
  const v = clamp(score / 100, 0, 1);
  const off = c * (1 - Math.max(v, .012));   // always show a sliver, even at 0
  const col = score >= 70 ? '#3DDC97' : score >= 45 ? '#FFC554' : '#FF7A88';
  return `<div class="gauge">
    <svg viewBox="0 0 160 160" preserveAspectRatio="xMidYMid meet">
      <circle cx="80" cy="80" r="${r}" class="gauge-track" stroke-width="13"/>
      <circle cx="80" cy="80" r="${r}" fill="none" stroke="${col}" stroke-width="13" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 80 80)"
        style="transition:stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)"/>
    </svg>
    <div class="gauge-lb"><b class="disp">${Math.round(score)}</b><span>/ 100</span></div>
  </div>`;
}

/* ============================================================
   Easy sync — a single link, no accounts, no tokens
   The data is gzipped and base64'd into the URL *fragment*, which
   browsers never send to any server. Send the link to yourself
   (WhatsApp / email / AirDrop), open it on the other device, done.
   ============================================================ */
function b64enc(bytes) {
  let s = '';
  for (let i = 0; i < bytes.length; i += 8192) s += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192));
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64dec(str) {
  const s = str.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(s + '==='.slice((s.length + 3) % 4));
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
async function packState() {
  const json = JSON.stringify({ app: 'ascent-gate', version: 1, data: redactedState() });
  const raw = new TextEncoder().encode(json);
  if (typeof CompressionStream === 'undefined') return 'r' + b64enc(raw);
  const cs = new CompressionStream('gzip');
  const w = cs.writable.getWriter(); w.write(raw); w.close();
  const buf = new Uint8Array(await new Response(cs.readable).arrayBuffer());
  return 'z' + b64enc(buf);
}
async function unpackState(payload) {
  const tag = payload[0], body = payload.slice(1);
  const bytes = b64dec(body);
  let json;
  if (tag === 'z') {
    if (typeof DecompressionStream === 'undefined') throw new Error('no gzip support');
    const ds = new DecompressionStream('gzip');
    const w = ds.writable.getWriter(); w.write(bytes); w.close();
    json = await new Response(ds.readable).text();
  } else json = new TextDecoder().decode(bytes);
  const j = JSON.parse(json);
  return j && j.data ? j.data : j;
}
function adoptState(d, msg) {
  const base = defaultState();
  const keepToken = (S.settings.gist && S.settings.gist.token) || '';
  S = { v: 1,
    settings: Object.assign(base.settings, d.settings || {}),
    subjects: Array.isArray(d.subjects) && d.subjects.length ? d.subjects : base.subjects,
    logs: d.logs || {}, mocks: Array.isArray(d.mocks) ? d.mocks : [],
    planChecks: d.planChecks || {}, planEdits: d.planEdits || {}, planRepeat: d.planRepeat || [],
    paceHist: d.paceHist || {}, timer: null,
    flags: Object.assign(base.flags, d.flags || {}, { welcome: false }) };
  if (!S.settings.gist.token) S.settings.gist.token = keepToken;
  save(); applyTheme(); go('dashboard'); toast(msg || 'Synced — this device is up to date.');
}
async function syncLinkModal() {
  let link = '', err = '';
  try {
    const payload = await packState();
    link = location.origin + location.pathname + '#s=' + payload;
    if (link.length > 60000) err = 'Your history is large, so this link is long — some chat apps may cut it. If the other device says the link is broken, use the backup file instead.';
  } catch (e) { err = 'Could not build the link on this browser — use the backup file instead.'; }
  openModal(`<div class="m-head"><span class="m-t">Sync to another device</span><button class="icon-btn" data-action="modal-x" aria-label="Close">${icon('x')}</button></div>
    <p class="small muted" style="margin-bottom:12px">Copy this link and send it to yourself — WhatsApp, email, Notes, AirDrop, anything. Open it on your phone/laptop and Ascent will offer to load everything. Your data rides inside the link itself; it is never uploaded anywhere.</p>
    ${link ? `<div class="field"><label>Your sync link</label><textarea class="input" id="sync-link" rows="3" readonly>${esc(link)}</textarea></div>` : ''}
    ${err ? `<p class="tiny" style="color:var(--warn)">${err}</p>` : ''}
    <div class="frow g8 wrap" style="margin-top:12px">
      ${link ? `<button class="btn primary" data-action="sync-copy">${icon('check')} Copy link</button>` : ''}
      ${link && navigator.share ? `<button class="btn" data-action="sync-share">${icon('up')} Share…</button>` : ''}
      <button class="btn ghost" data-action="export">${icon('down')} Backup file instead</button>
    </div>
    <p class="tiny muted mt6">Anyone with the link can read your study data (subjects, hours, mock scores). Don't post it publicly.</p>`);
}
function syncPasteModal() {
  openModal(`<div class="m-head"><span class="m-t">Load from a sync link</span><button class="icon-btn" data-action="modal-x" aria-label="Close">${icon('x')}</button></div>
    <p class="small muted" style="margin-bottom:12px">Paste the link you sent yourself from the other device. (Or just open the link directly — this is only for when tapping it doesn't work.)</p>
    <div class="field"><label>Sync link</label><textarea class="input" id="sync-paste" rows="3" placeholder="https://…#s=…"></textarea></div>
    <div class="m-foot"><button class="btn ghost" data-action="modal-x">Cancel</button><button class="btn primary" data-action="sync-load">Load data</button></div>`);
}
async function loadFromText(txt) {
  const m = /#s=([A-Za-z0-9\-_]+)/.exec(String(txt || '').trim());
  if (!m) { toast("That doesn't look like an Ascent sync link."); return; }
  try {
    const d = await unpackState(m[1]);
    closeModal();
    confirmModal('Load this data?', 'Everything currently on this device will be replaced by the synced copy.', 'Load & replace',
      () => adoptState(d), true);
  } catch (e) { toast('That link is damaged or incomplete — try the backup file.'); }
}
async function checkSyncHash() {
  const m = /^#s=([A-Za-z0-9\-_]+)$/.exec(location.hash || '');
  if (!m) return;
  history.replaceState(null, '', location.pathname + location.search);
  try {
    const d = await unpackState(m[1]);
    const subs = Array.isArray(d.subjects) ? d.subjects.length : 0;
    const logs = d.logs ? Object.keys(d.logs).length : 0;
    confirmModal('Sync data found in this link',
      `It contains <b>${subs} subjects</b>, <b>${logs} logged days</b> and <b>${(d.mocks || []).length} mocks</b>. Load it onto this device? Anything already here will be replaced.`,
      'Load it', () => adoptState(d, 'Loaded — this device is in sync.'));
  } catch (e) { toast('That sync link is damaged — ask the other device for a fresh one.'); }
}
</script>
