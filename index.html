<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ascent · GATE CSE &amp; DA Tracker</title>
<meta name="description" content="Ascent — a free, offline-friendly GATE CSE & DA preparation command center. Countdown, required daily pace, GO Classes lecture tracking, smart phase-based planning, daily logs, mocks and more.">
<meta id="meta-theme" name="theme-color" content="#0B0E17">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M2.5 20 10 5.5l4.5 8.5L17 9.5 21.5 20Z' fill='%237C93FF'/><path d='M11.5 20l5.3-10.2L21.5 20Z' fill='%2334D3B1'/></svg>">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Ascent — GATE CSE & DA command center
   Single-file app · zero dependencies · dark/light · responsive
   ============================================================ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --font-ui:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --font-disp:'Space Grotesk','Inter',system-ui,sans-serif;
  --acc:#7C93FF; --acc2:#34D3B1;
  --cse:#7C93FF; --da:#34D3B1;
  --ok:#3DDC97; --warn:#FFC554; --bad:#FF7A88;
  --r:16px; --r-sm:10px;
  --pad:18px;
}

html[data-theme="dark"]{
  --bg:#0B0E17; --bg2:#0E1220;
  --card:#121729; --card2:#171D33;
  --border:#232B45; --border2:#2C3555;
  --text:#E9EDF8; --muted:#8C96B2; --faint:#5E6883;
  --glow:radial-gradient(900px 420px at 20% -10%, rgba(124,147,255,.16), transparent 60%),
         radial-gradient(700px 380px at 90% -10%, rgba(52,211,177,.10), transparent 55%);
  --shadow:0 8px 28px rgba(3,6,18,.45);
  --input-bg:#0E1322;
  --hover:rgba(255,255,255,.045);
  color-scheme:dark;
}
html[data-theme="light"]{
  --bg:#F3F5FB; --bg2:#EDF0F8;
  --card:#FFFFFF; --card2:#F7F9FF;
  --border:#E2E7F3; --border2:#CBD3E8;
  --text:#141A2A; --muted:#5C6580; --faint:#9AA3BC;
  --glow:radial-gradient(900px 420px at 20% -10%, rgba(124,147,255,.14), transparent 60%),
         radial-gradient(700px 380px at 90% -10%, rgba(52,211,177,.10), transparent 55%);
  --shadow:0 8px 24px rgba(22,32,66,.08);
  --input-bg:#FFFFFF;
  --hover:rgba(20,26,42,.045);
  color-scheme:light;
}

html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--font-ui);
  background:var(--bg);
  color:var(--text);
  font-size:15px; line-height:1.5;
  min-height:100vh;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none;
  background:var(--glow); z-index:0;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit}
img,svg{display:block}
::selection{background:rgba(124,147,255,.35)}

.ic{width:18px;height:18px;flex:none}
.disp{font-family:var(--font-disp);letter-spacing:-.02em}
.tiny{font-size:.78rem}
.small{font-size:.86rem}
.muted{color:var(--muted)}
.center{text-align:center}
.mt6{margin-top:6px}
.spacer{flex:1}
.ok-t{color:var(--ok);font-weight:600}
.bad-t{color:var(--bad);font-weight:600}

/* ---------- app shell ---------- */
.app{display:grid;grid-template-columns:236px minmax(0,1fr);min-height:100vh;position:relative;z-index:1}

.sidebar{
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:8px;
  padding:22px 14px 16px;
  border-right:1px solid var(--border);
  background:linear-gradient(180deg,var(--bg2),var(--bg));
}
.brand{display:flex;align-items:center;gap:11px;padding:2px 8px 18px}
.brand-logo{width:34px;height:34px;flex:none;filter:drop-shadow(0 4px 10px rgba(124,147,255,.35))}
.brand b{font-family:var(--font-disp);font-size:1.18rem;letter-spacing:-.01em;display:block;line-height:1.1}
.brand span{font-size:.72rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}

.side-nav{display:flex;flex-direction:column;gap:3px}
.nav-btn{
  display:flex;align-items:center;gap:11px;
  padding:10px 12px;border-radius:11px;
  color:var(--muted);font-weight:500;font-size:.92rem;
  transition:background .15s,color .15s;
}
.nav-btn:hover{background:var(--hover);color:var(--text)}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(124,147,255,.16),rgba(52,211,177,.10));
  color:var(--text);
  box-shadow:inset 0 0 0 1px var(--border2);
}
.nav-btn.active .ic{color:var(--acc)}

.side-foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:8px 6px 0;border-top:1px solid var(--border)}
.save-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);margin-left:auto;transition:background .3s,box-shadow .3s}
.save-dot.on{background:var(--ok);box-shadow:0 0 10px var(--ok)}
.foot-note{font-size:.7rem;color:var(--faint)}

/* topbar + bottom nav (mobile) */
.topbar{display:none}
.bottomnav{display:none}

.main{padding:30px 34px 60px;min-width:0}

/* ---------- view scaffolding ---------- */
.view{display:none;animation:fadein .25s ease}
.view.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.vhead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.vhead h1{font-family:var(--font-disp);font-size:1.62rem;font-weight:700;letter-spacing:-.02em}
.vsub{color:var(--muted);font-size:.88rem;margin-top:2px;max-width:640px}
.vact{display:flex;gap:10px}

/* ---------- grid ---------- */
.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:16px}
.c4{grid-column:span 4}.c5{grid-column:span 5}.c6{grid-column:span 6}
.c7{grid-column:span 7}.c8{grid-column:span 8}.c12{grid-column:span 12}

/* Dashboard-only — Today's plan (8) + Streak (4) pair to fill a row exactly.
   Kept separate from .c4/.c5/.c6/.c7 so no other view is affected. */
.dash-plan{grid-column:span 8}
.dash-streak{grid-column:span 4}
@media (max-width:1180px){
  .dash-plan,.dash-streak{grid-column:span 12}
}

/* ---------- cards ---------- */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  min-width:0;
  position:relative;
}
.card.pad{padding:var(--pad)}
.pad-h{padding:var(--pad) var(--pad) 10px}
.card-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.card-t{display:flex;align-items:center;gap:8px;font-weight:600;font-size:.95rem}
.card-t .ic{color:var(--acc);width:17px;height:17px}

/* ---------- buttons & inputs ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 15px;border-radius:11px;font-weight:600;font-size:.88rem;
  background:var(--card2);border:1px solid var(--border2);
  transition:transform .12s,box-shadow .15s,background .15s,border-color .15s;
}
.btn:hover{transform:translateY(-1px);border-color:var(--acc)}
.btn:active{transform:none}
.btn .ic{width:16px;height:16px}
.btn.primary{
  background:linear-gradient(135deg,#7C93FF,#5EC8F2);
  border-color:transparent;color:#0A0E1D;
}
.btn.primary:hover{box-shadow:0 6px 18px rgba(124,147,255,.35)}
.btn.danger{color:var(--bad)}
.btn.danger:not(.ghost){background:rgba(255,122,136,.12);border-color:rgba(255,122,136,.4)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 11px;font-size:.8rem;border-radius:9px}

.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:9px;color:var(--muted);
  transition:background .15s,color .15s;
}
.icon-btn:hover{background:var(--hover);color:var(--text)}
.icon-btn .ic{width:16px;height:16px}

.input{
  width:100%;padding:9px 12px;border-radius:10px;
  background:var(--input-bg);border:1px solid var(--border2);
  font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;
}
.input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(124,147,255,.18)}
.input.mini{width:64px;padding:5px 8px;font-size:.82rem;text-align:center}
.input.search{max-width:230px}
select.input,.input.select{appearance:auto;cursor:pointer;width:auto}
input[type="date"].input{cursor:pointer}
.field{display:flex;flex-direction:column;gap:6px;min-width:0;flex:1}
.field>label{font-size:.76rem;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.frow{display:flex;align-items:center;gap:12px;min-width:0}
.frow.g8{gap:10px}
.frow.wrap{flex-wrap:wrap}

input[type="range"]{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));outline:none;cursor:pointer;
}
input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#fff;border:3px solid var(--acc);box-shadow:0 2px 8px rgba(0,0,0,.35);
}
input[type="range"]::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--acc);
}

/* segmented control */
.seg{display:inline-flex;gap:3px;padding:3px;background:var(--input-bg);border:1px solid var(--border);border-radius:11px}
.seg-b{padding:6px 13px;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--muted);transition:background .15s,color .15s;white-space:nowrap}
.seg-b:hover{color:var(--text)}
.seg-b.active{background:var(--card2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2)}

/* badges */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:99px;font-size:.72rem;font-weight:700;
  letter-spacing:.04em;border:1px solid transparent;white-space:nowrap;
}
.b-cse{background:rgba(124,147,255,.14);color:var(--cse);border-color:rgba(124,147,255,.4)}
.b-da{background:rgba(52,211,177,.13);color:var(--da);border-color:rgba(52,211,177,.4)}
.s-ok{background:rgba(61,220,151,.13);color:var(--ok);border-color:rgba(61,220,151,.4)}
.s-warn{background:rgba(255,197,84,.13);color:var(--warn);border-color:rgba(255,197,84,.4)}
.s-bad{background:rgba(255,122,136,.13);color:var(--bad);border-color:rgba(255,122,136,.4)}

/* banner */
.banner{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:13px;font-size:.87rem;
  background:linear-gradient(135deg,rgba(124,147,255,.12),rgba(52,211,177,.08));
  border:1px solid var(--border2);
}
.banner .ic{color:var(--acc);flex:none}
.banner.warn{background:rgba(255,197,84,.1);border-color:rgba(255,197,84,.35)}
.banner.warn .ic{color:var(--warn)}
.banner>div{flex:1}

/* ---------- KPIs, bars, rings ---------- */
.kpi{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.kpi-num{font-family:var(--font-disp);font-size:2.35rem;font-weight:700;letter-spacing:-.03em;line-height:1;background:linear-gradient(120deg,var(--text),var(--muted));-webkit-background-clip:text;background-clip:text}
.kpi-sub{font-size:.8rem;color:var(--muted)}

.bar{height:8px;border-radius:99px;background:var(--input-bg);border:1px solid var(--border);overflow:hidden;margin:9px 0 7px}
.bar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .45s cubic-bezier(.22,1,.36,1)}

.ring{position:relative;display:grid;place-items:center;margin:0 auto}
.ring svg{position:absolute;inset:0}
.ring-bg{fill:none;stroke:var(--border2);opacity:.55}
.ring-fg{fill:none;transition:stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)}
.ring-lb{text-align:center;line-height:1.15;z-index:1}
.ring-lb b{font-family:var(--font-disp);font-size:1.3rem;letter-spacing:-.02em;display:block}
.ring-lb span{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.rings{display:flex;justify-content:space-evenly;gap:10px;padding:6px 0 12px;flex-wrap:wrap}
.mini-ring .ring-lb b{font-size:1.02rem}
.mini-ring{flex:none}

/* ---------- countdown hero ---------- */
.count-card{overflow:hidden}
.count-card::before{
  content:'';position:absolute;inset:-40% -20% auto;height:150%;pointer-events:none;
  background:radial-gradient(420px 210px at 30% 0%,var(--cc,rgba(124,147,255,.22)),transparent 65%);
}
.count-card[data-count="da"]{--cc:rgba(52,211,177,.2)}
.count-num{display:flex;align-items:baseline;gap:10px;margin:2px 0 4px;position:relative}
.count-num .cd-d{font-size:clamp(2.7rem,5.2vw,3.7rem);font-weight:700;line-height:1;letter-spacing:-.035em}
.count-lbl{font-size:.95rem;color:var(--muted);font-weight:600}
.count-sub{position:relative}
.count-done{display:flex;gap:9px;align-items:center;color:var(--muted);font-size:.9rem;padding:14px 0}
.count-done .ic{color:var(--ok)}

/* chips for time split */
.split-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.schip{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 11px;border-radius:99px;font-size:.78rem;color:var(--muted);
  background:var(--input-bg);border:1px solid var(--border);white-space:nowrap;
}
.schip i{width:8px;height:8px;border-radius:50%;flex:none}
.schip b{color:var(--text);font-weight:600}
.schip.mockday{border-color:rgba(255,143,177,.5)}

/* ---------- today plan ---------- */
.plan-list{display:flex;flex-direction:column;gap:7px}
.plan-item{
  display:flex;align-items:center;gap:8px;
  padding:11px 13px;border-radius:12px;
  background:var(--card2);border:1px solid var(--border);
  transition:border-color .15s,opacity .2s;
}
.pi-main{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}
.pi-acts{display:flex;gap:4px;flex:none}
.pi-acts .icon-btn{width:32px;height:32px;background:var(--input-bg);border:1px solid var(--border2);color:var(--muted)}
.pi-acts .icon-btn:hover{color:var(--text);border-color:var(--acc)}
.pi-acts .icon-btn.del:hover{color:var(--bad);border-color:var(--bad)}
@media (max-width:720px){ .pi-acts .icon-btn{width:36px;height:36px} .plan-item{gap:6px;padding:10px} }
.plan-item:hover{border-color:var(--border2)}
.plan-item input{width:17px;height:17px;accent-color:var(--acc2);cursor:pointer;flex:none}
.pi-ic{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;flex:none;
  background:linear-gradient(135deg,rgba(124,147,255,.15),rgba(52,211,177,.12));color:var(--acc)}
.pi-ic .ic{width:15px;height:15px}
.pi-tx{display:flex;flex-direction:column;min-width:0}
.pi-tx b{font-size:.88rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-tx span{font-size:.75rem;color:var(--muted)}
.plan-item.done{opacity:.5}
.plan-item.done .pi-tx b{text-decoration:line-through}

/* quick / log forms */
.qform{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.qform .btn{grid-column:1/-1;justify-content:center}
.lform{display:flex;flex-direction:column;gap:13px}

/* ---------- heatmap ---------- */
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,var(--hc,14px));grid-auto-columns:var(--hc,14px);gap:3px}
.hc{width:var(--hc,14px);height:var(--hc,14px);border-radius:3px;background:var(--input-bg);border:1px solid var(--border)}
.hc.l1{background:rgba(52,211,177,.28);border-color:transparent}
.hc.l2{background:rgba(52,211,177,.5);border-color:transparent}
.hc.l3{background:rgba(78,190,255,.72);border-color:transparent}
.hc.l4{background:var(--acc);border-color:transparent;box-shadow:0 0 6px rgba(124,147,255,.5)}
.hc.future{opacity:.28}
.heat-leg{display:inline-flex;align-items:center;gap:4px}
.heat-leg .hc{width:11px;height:11px;aspect-ratio:auto;display:inline-block}

/* week mini bars */
.wbars{display:flex;align-items:flex-end;gap:7px;height:66px;margin:12px 2px 4px}
.wb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%}
.wb i{width:100%;max-width:26px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--acc),var(--acc2));min-height:4px}
.wb i.z{background:var(--input-bg);border:1px solid var(--border)}
.wb span{font-size:.66rem;color:var(--faint)}

/* stats */
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px}
.stat{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 13px}
.stat b{font-size:1.25rem;display:block;letter-spacing:-.02em}
.stat span{font-size:.72rem;color:var(--muted)}

/* ---------- rows (history / mocks) ---------- */
.rows{display:flex;flex-direction:column;max-height:520px;overflow:auto}
.row{display:grid;align-items:center;gap:10px;padding:10px var(--pad);border-top:1px solid var(--border);font-size:.86rem}
.log-r{grid-template-columns:66px 56px 64px 50px minmax(0,1fr) auto}
.mock-r{grid-template-columns:66px auto minmax(0,1.2fr) 72px 52px minmax(0,1fr) auto}
.r-date{color:var(--muted);font-weight:600;font-size:.8rem}
.r-kv{white-space:nowrap}
.r-name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-note{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.8rem}
.r-act{display:flex;gap:2px;justify-content:flex-end}

/* ---------- subjects ---------- */
.sum-card{margin-bottom:14px;display:flex;flex-direction:column;gap:11px}
.sum-row{display:flex;align-items:center;gap:13px}
.sum-bar{flex:1;min-width:120px}
.sum-bar .bar{margin:0}
.toolbar{display:flex;align-items:center;gap:11px;margin-bottom:15px;flex-wrap:wrap}
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.subj{padding:15px 16px 13px;transition:border-color .15s,transform .15s}
.subj:hover{border-color:var(--border2);transform:translateY(-2px)}
.subj.inactive{opacity:.6}
.subj-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}
.subj-name{font-weight:650;font-size:.98rem;letter-spacing:-.01em}
.subj-meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
.subj-acts{display:flex;gap:1px;flex:none;opacity:.55;transition:opacity .15s}
.subj:hover .subj-acts{opacity:1}
.lect-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.stepper{display:inline-flex;align-items:center;gap:2px;background:var(--input-bg);border:1px solid var(--border2);border-radius:11px;padding:3px}
.step-b{display:grid;place-items:center;width:30px;height:30px;border-radius:8px;color:var(--muted);transition:background .12s,color .12s}
.step-b:hover{background:var(--hover);color:var(--text)}
.step-b .ic{width:14px;height:14px}
.step-in{width:52px;text-align:center;background:transparent;border:none;outline:none;font-weight:700;font-size:.95rem;font-family:var(--font-disp);-moz-appearance:textfield}
.step-in::-webkit-outer-spin-button,.step-in::-webkit-inner-spin-button{-webkit-appearance:none}
.step-t{font-size:.8rem;color:var(--muted);padding-right:8px;white-space:nowrap}
.subj-pct{font-size:1.35rem;font-weight:700;letter-spacing:-.02em;color:var(--sc,var(--acc))}
.subj .bar-f{background:var(--sc,var(--acc))}
.subj-foot{display:flex;align-items:center;gap:7px;margin-top:9px}
.rev-chips{display:inline-flex;gap:4px}
.rev-chip{padding:3px 8px;border-radius:7px;font-size:.7rem;font-weight:700;color:var(--faint);background:var(--input-bg);border:1px solid var(--border);transition:all .12s}
.rev-chip:hover{color:var(--text)}
.rev-chip.on{background:rgba(255,197,84,.16);border-color:rgba(255,197,84,.55);color:var(--warn)}

/* ---------- planner ---------- */
.verdict::before{content:'';position:absolute;inset:0 0 auto;height:3px;border-radius:var(--r) var(--r) 0 0;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.verdict-num{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:4px 0 10px}
.verdict-num .disp{font-size:clamp(2.4rem,5vw,3.4rem);font-weight:700;line-height:1;letter-spacing:-.035em}
.verdict p{max-width:74ch}

.phasebar{display:flex;height:34px;border-radius:11px;overflow:hidden;border:1px solid var(--border)}
.ph-seg{position:relative;display:grid;place-items:center;min-width:5px}
.ph-seg i{position:absolute;inset:0;background:var(--pc);opacity:.3}
.ph-seg.now i{opacity:.85}
.ph-seg span{position:relative;font-size:.68rem;font-weight:700;letter-spacing:.03em;color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,.3);white-space:nowrap;overflow:hidden;max-width:95%;text-overflow:ellipsis;padding:0 4px}
.ph-seg.now span{color:#fff}
html[data-theme="light"] .ph-seg span{text-shadow:none}
html[data-theme="light"] .ph-seg.now span{color:#1a2033;text-shadow:none}
.ph-axis{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:7px}

.alloc{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.donut{position:relative;width:130px;height:130px;border-radius:50%;flex:none;display:grid;place-items:center}
.donut i{position:absolute;inset:17px;border-radius:50%;background:var(--card)}
.donut-lb{position:relative;text-align:center;line-height:1.1}
.donut-lb b{font-family:var(--font-disp);font-size:1.35rem;letter-spacing:-.02em;display:block}
.donut-lb span{font-size:.68rem;color:var(--muted)}
.al-chips{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px;flex:1;min-width:190px}
.al-chip{display:flex;align-items:center;gap:9px}
.al-chip i{width:9px;height:9px;border-radius:3px;flex:none}
.al-chip b{font-size:.84rem;display:block;line-height:1.2}
.al-chip span{font-size:.73rem;color:var(--muted)}

.whatif{display:flex;align-items:center;gap:16px;margin:8px 0 13px}
.whatif .disp{font-size:1.5rem;font-weight:700;min-width:64px;text-align:right}

.week{display:flex;flex-direction:column;gap:6px}
.wk-row{display:flex;align-items:center;gap:13px;padding:8px 11px;border-radius:11px;border:1px solid transparent}
.wk-row.today{background:var(--card2);border-color:var(--border2)}
.wk-d{width:46px;font-weight:700;font-size:.82rem;color:var(--muted);flex:none}
.wk-row.today .wk-d{color:var(--text)}
.wk-d i{display:block;font-style:normal;font-size:.6rem;color:var(--acc2);letter-spacing:.08em;text-transform:uppercase}
.wk-chips{display:flex;gap:7px;flex-wrap:wrap}

/* ---------- mock chart ---------- */
.mockchart{width:100%;height:auto;margin-top:4px}
.mg{stroke:var(--border);stroke-width:1}
.mct{fill:var(--faint);font-size:10px;font-family:var(--font-ui)}
.ma{fill:rgba(124,147,255,.13);stroke:none}
.ml{fill:none;stroke:var(--acc);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.md{stroke:var(--card);stroke-width:2}
.md.cse{fill:var(--cse)}
.md.da{fill:var(--da)}
.mock-stats b{color:var(--text)}

/* ---------- modal ---------- */
.modal-back{
  position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:18px;
  background:rgba(5,8,18,.6);backdrop-filter:blur(6px);animation:fadein .18s ease;
}
.modal{
  width:min(480px,100%);max-height:88vh;overflow:auto;
  background:var(--card);border:1px solid var(--border2);border-radius:18px;
  padding:20px;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:pop .2s cubic-bezier(.22,1.4,.36,1);
}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:none;opacity:1}}
.m-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.m-t{font-family:var(--font-disp);font-weight:700;font-size:1.12rem;letter-spacing:-.01em}
.modal form{display:flex;flex-direction:column;gap:13px}
.m-foot{display:flex;justify-content:flex-end;gap:9px;margin-top:6px}

/* ---------- toasts ---------- */
.toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:13px;pointer-events:auto;
  padding:11px 17px;border-radius:13px;font-size:.87rem;font-weight:500;
  background:var(--card2);border:1px solid var(--border2);box-shadow:var(--shadow);
  animation:toastin .25s cubic-bezier(.22,1.4,.36,1);max-width:min(92vw,480px);
}
@keyframes toastin{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.toast.out{opacity:0;transform:translateY(8px);transition:all .3s}
.toast-b{color:var(--acc);font-weight:700;white-space:nowrap}
.toast-b:hover{text-decoration:underline}

/* ---------- empty state ---------- */
.empty{
  grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:6px;
  text-align:center;padding:44px 20px;color:var(--muted);
}
.empty .ic{width:30px;height:30px;color:var(--faint);margin-bottom:6px}
.empty b{color:var(--text);font-size:.98rem}
.empty span{font-size:.84rem;max-width:340px}
.empty .btn{margin-top:12px}

.about{font-size:.8rem;color:var(--muted);line-height:1.6}
.about b{color:var(--text);font-family:var(--font-disp)}

/* ---------- focus & a11y ---------- */
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:6px}
.input:focus-visible,.step-in:focus-visible{outline:none}

/* ---------- scrollbar ---------- */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--faint)}

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width:1180px){
  .c4{grid-column:span 6}
  .c5,.c7{grid-column:span 12}
  .main{padding:26px 24px 60px}
}

@media (max-width:1020px){
  .app{display:block}
  .sidebar{display:none}

  .topbar{
    display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:40;
    padding:12px 16px;
    padding-top:calc(12px + env(safe-area-inset-top));
    background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);
  }
  .tb-brand{display:flex;align-items:center;gap:9px}
  .tb-brand .brand-logo{width:27px;height:27px}
  .tb-brand b{font-family:var(--font-disp);font-size:1.05rem}
  .tb-act{margin-left:auto;display:flex;gap:4px}

  .bottomnav{
    display:flex;position:fixed;bottom:0;left:0;right:0;z-index:40;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--border);
    padding:7px 8px calc(7px + env(safe-area-inset-bottom));
  }
  .bn-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 4px;border-radius:11px;color:var(--faint);font-size:.64rem;font-weight:600;
    letter-spacing:.02em;transition:color .15s;
  }
  .bn-btn .ic{width:19px;height:19px}
  .bn-btn.active{color:var(--acc)}
  .bn-btn:active{transform:scale(.94)}

  .main{padding:20px 16px calc(92px + env(safe-area-inset-bottom))}
  .vhead h1{font-size:1.42rem}
}

@media (max-width:720px){
  .c4,.c5,.c6,.c7,.c8{grid-column:span 12}
  .grid{gap:12px}
  .input{font-size:16px}   /* prevent iOS zoom */
  .subj-grid{grid-template-columns:1fr}
  .statgrid{grid-template-columns:repeat(3,1fr)}
  .qform{grid-template-columns:1fr 1fr 1fr}
  .al-chips{grid-template-columns:1fr 1fr}
  .toolbar .search{max-width:none;flex:1;order:3;min-width:100%}
  .count-num .cd-d{font-size:3rem}
  .verdict-num .disp{font-size:2.3rem}
  .row{display:flex;flex-wrap:wrap;gap:6px 12px}
  .r-note{flex-basis:100%;order:9;white-space:normal}
  .r-act{margin-left:auto}
  .rows{max-height:none}
  .wk-chips{gap:5px}
  .schip{padding:4px 9px;font-size:.72rem}
  .whatif{gap:12px}
}

@media (max-width:400px){
  .statgrid{grid-template-columns:repeat(2,1fr)}
  .seg-b{padding:6px 9px;font-size:.76rem}
}

/* ---------- reduced motion ---------- */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}


/* ---------- phase legend (planner runway) ---------- */
.ph-legend{display:flex;flex-direction:column;gap:2px;margin-top:14px}
.ph-row{
  display:grid;align-items:center;gap:10px;
  grid-template-columns:10px minmax(120px,1.1fr) minmax(120px,1fr) 64px minmax(160px,1.4fr);
  padding:8px 10px;border-radius:10px;border:1px solid transparent;font-size:.84rem;
}
.ph-row.now{background:var(--card2);border-color:var(--border2)}
.ph-row>i{width:10px;height:10px;border-radius:3px}
.ph-nm{display:flex;align-items:center;gap:7px;min-width:0}
.ph-nm b{font-weight:650}
.ph-nm .badge{font-size:.62rem;padding:2px 7px}
.ph-dt{color:var(--muted);white-space:nowrap}
.ph-ln{color:var(--muted);white-space:nowrap;font-size:.8rem}
.ph-sp{color:var(--faint);font-size:.76rem;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media (max-width:820px){
  .ph-row{grid-template-columns:10px 1fr auto;row-gap:2px}
  .ph-dt{grid-column:2/4;font-size:.78rem}
  .ph-ln{grid-column:3/4;grid-row:1;text-align:right}
  .ph-sp{grid-column:2/4;text-align:left}
}

.pi-hint{display:none}
.plan-item:hover .pi-hint{display:block;white-space:nowrap;margin-right:2px}
@media (max-width:900px){.plan-item:hover .pi-hint{display:none}}

/* ---------- insights ---------- */
.ins-row{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:baseline;gap:2px 10px;padding:7px 0}
.ins-lb{font-size:.86rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ins-lb em{font-style:normal}
.ins-v{grid-column:2;text-align:right;font-size:.95rem;font-weight:700;font-family:var(--font-disp);white-space:nowrap;letter-spacing:-.02em}
.ins-v b{font-family:var(--font-disp)}
.ins-bar{grid-column:1/-1}
.ins-bar .bar{margin:4px 0 0}

/* readiness gauge — fluid, never overflows its card */
.ready-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.gauge{position:relative;width:clamp(112px,32%,160px);aspect-ratio:1;flex:none;display:grid;place-items:center}
.gauge svg{position:absolute;inset:0;width:100%;height:100%}
.gauge-track{fill:none;stroke:var(--border2);opacity:.6}
.gauge-lb{position:relative;text-align:center;line-height:1.05}
.gauge-lb b{display:block;font-size:clamp(1.7rem,4.6vw,2.3rem);font-weight:700;letter-spacing:-.03em}
.gauge-lb span{font-size:.7rem;color:var(--muted)}
.ready-parts{flex:1 1 220px;min-width:190px}
@media (max-width:520px){
  .ready-wrap{gap:14px}
  .gauge{width:104px}
  .ready-parts{flex-basis:100%}
}
.bd-ideal{fill:none;stroke:var(--faint);stroke-width:2;stroke-dasharray:6 6}
.bd-proj{stroke:var(--warn);stroke-width:2;stroke-dasharray:4 5}
.bd-tgt{stroke:var(--border2);stroke-width:1.5;stroke-dasharray:3 4}

/* ---------- toggles ---------- */
.tog-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-top:1px solid var(--border)}
.tog-row:first-of-type{border-top:none}
.tog-row .seg{cursor:pointer}

/* ---------- focus timer ---------- */
.timer-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.timer-face{position:relative;width:120px;height:120px;flex:none;display:grid;place-items:center}
.timer-face svg{position:absolute;inset:0;width:120px;height:120px}
.timer-face b{position:relative;font-size:1.5rem;letter-spacing:-.02em}
.timer-side{flex:1;min-width:150px;display:flex;flex-direction:column;gap:8px}
.timer-side .input{width:100%}
#timer-btns .btn{flex:1;justify-content:center}

/* ---------- chip picker (mock weak areas) ---------- */
.chip-pick{display:flex;flex-wrap:wrap;gap:6px;max-height:132px;overflow:auto;padding:2px}
.chip-pick .rev-chip{font-size:.72rem;padding:5px 9px;font-weight:600}

/* ---------- command palette ---------- */
.pal{width:min(560px,92vw)}
.pal-in{margin-bottom:10px;font-size:1rem}
.pal-list{display:flex;flex-direction:column;gap:2px;max-height:46vh;overflow:auto}
.pal-i{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:10px;font-size:.9rem;color:var(--muted)}
.pal-i:hover,.pal-i.on{background:var(--card2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2)}
.pal-foot{margin-top:10px;text-align:center}

/* ---------- heatmap: labels + month calendar ---------- */
.heat-scroll{overflow-x:auto;overflow-y:hidden;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.heat-wrap{display:inline-flex;gap:7px;align-items:flex-start}
.heat-days{display:grid;grid-template-rows:repeat(7,var(--hc,14px));gap:3px;font-size:.58rem;color:var(--faint);flex:none;padding-top:17px;text-align:right}
.heat-days span{display:flex;align-items:center;justify-content:flex-end;line-height:1;height:var(--hc,14px)}
.heat-body{flex:none}
.heat-months{display:grid;grid-auto-flow:column;grid-auto-columns:var(--hc,14px);gap:3px;font-size:.64rem;color:var(--faint);height:14px;margin-bottom:3px}
.heat-months span{white-space:nowrap;line-height:1}
.heat-leg .hc{width:11px;height:11px}
@media (max-width:720px){ .heat{--hc:13px} .heat-days{--hc:13px} .heat-months{grid-auto-columns:13px} }

.month-wrap{display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start}
.mcal-box{flex:1 1 300px;max-width:440px;min-width:0}
.month-stats{flex:1 1 260px;min-width:0}
.month-stats .statgrid{grid-template-columns:repeat(3,1fr)}
.mcal-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.mcal-head b{font-family:var(--font-disp);font-size:1.02rem}
.mcal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;font-size:.66rem;color:var(--faint);text-align:center}
.mcal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;align-content:start}
.mc{
  display:flex;flex-direction:column;align-items:flex-start;justify-content:space-between;gap:2px;
  min-height:clamp(46px,7.4vw,60px);
  padding:6px 7px;border-radius:9px;background:var(--input-bg);border:1px solid var(--border);
  text-align:left;min-width:0;overflow:hidden;transition:transform .12s,border-color .12s;
}
.mc:hover{transform:translateY(-1px);border-color:var(--acc)}
.mc b{font-size:.72rem;font-weight:600;color:var(--muted)}
.mc span{font-family:var(--font-disp);font-size:.82rem;font-weight:700;letter-spacing:-.02em}
.mc.empty{background:transparent;border:none;pointer-events:none;min-height:0}
.mc.future{opacity:.35;pointer-events:none}
.mc.today{box-shadow:0 0 0 2px var(--acc)}
.mc.l1{background:rgba(52,211,177,.2);border-color:transparent}
.mc.l2{background:rgba(52,211,177,.38);border-color:transparent}
.mc.l3{background:rgba(78,190,255,.5);border-color:transparent}
.mc.l4{background:rgba(124,147,255,.75);border-color:transparent}
.mc.l1 b,.mc.l2 b,.mc.l3 b,.mc.l4 b{color:var(--text)}
@media (max-width:900px){ .month-stats .statgrid{grid-template-columns:repeat(3,1fr)} }
@media (max-width:520px){ .mc{padding:4px;border-radius:7px} .mc b{font-size:.62rem} .mc span{font-size:.68rem} .mcal{gap:3px} .month-wrap{gap:14px} .month-stats .statgrid{grid-template-columns:repeat(2,1fr)} }

/* ---------- pace math box ---------- */
.mathbox{display:flex;flex-direction:column;gap:2px}
.mrow{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:11px;border:1px solid transparent}
.mrow:nth-child(odd){background:var(--card2)}
.mrow.total{border-color:var(--border2);background:linear-gradient(135deg,rgba(124,147,255,.12),rgba(52,211,177,.08));margin-top:6px}
.mno{display:grid;place-items:center;width:24px;height:24px;border-radius:7px;flex:none;
  background:var(--input-bg);border:1px solid var(--border);font-size:.74rem;font-weight:700;color:var(--muted)}
.mrow.total .mno{background:var(--acc);color:#0A0E1D;border-color:transparent}
.mtx{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
.mtx b{font-size:.88rem;font-weight:600}
.mval{font-size:1.05rem;font-weight:700;white-space:nowrap;letter-spacing:-.02em}
.mrow.total .mval{font-size:1.4rem;color:var(--acc)}
@media (max-width:600px){ .mrow{gap:9px;padding:9px} .mval{font-size:.95rem} }

/* ROI rows share .ins-row; keep the marks/hour value compact */
.ins-v .tiny{font-weight:500}
.statgrid.mt6{margin-top:10px}


/* ============================================================
   Global overflow safety — no card, chart or label may ever
   push the layout wider than the screen, at any size.
   ============================================================ */
html{max-width:100%;overflow-x:hidden}
body{max-width:100%}
.app,.main,.view,.grid,.card{min-width:0;max-width:100%}
svg,canvas,img{max-width:100%}
.card svg{height:auto}
.vhead h1,.card-t,.subj-name,.pi-tx b,.r-name,.ins-lb,.mtx b{overflow-wrap:anywhere}
.kpi-num,.count-num .cd-d,.verdict-num .disp{overflow-wrap:normal}
.seg{flex-wrap:wrap}
.card-h{row-gap:8px}
.statgrid{grid-template-columns:repeat(auto-fit,minmax(92px,1fr))}
.rows{overflow-x:auto}
.frow.wrap>*{min-width:0}
select.input,.input.select{max-width:100%}
.modal{width:min(480px,calc(100vw - 32px))}
.pal{width:min(560px,calc(100vw - 36px))}

/* very small phones (≤360px) */
@media (max-width:360px){
  .main{padding:16px 12px calc(88px + env(safe-area-inset-bottom))}
  .card.pad{padding:14px}
  .kpi-num{font-size:2rem}
  .btn{padding:8px 12px;font-size:.84rem}
  .bn-btn{font-size:.58rem}
  .mc{min-height:42px;padding:4px}
}

/* large desktops: keep content readable instead of stretched to 4K */
@media (min-width:1700px){
  .main{max-width:1520px}
}

/* advanced disclosure (settings) */
.adv{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.adv summary{cursor:pointer;font-size:.84rem;font-weight:600;color:var(--muted);list-style:none}
.adv summary::-webkit-details-marker{display:none}
.adv summary::before{content:'▸ ';color:var(--acc)}
.adv[open] summary::before{content:'▾ '}
.adv summary:hover{color:var(--text)}
textarea.input{resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.76rem;line-height:1.4;word-break:break-all}
</style>
</head>

  <aside class="sidebar">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 24 24" aria-hidden="true">
        <defs><linearGradient id="blg" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0" stop-color="#7C93FF"/><stop offset="1" stop-color="#5EC8F2"/>
        </linearGradient></defs>
        <path d="M2.5 20 10 5.5l4.5 8.5L17 9.5 21.5 20Z" fill="url(#blg)"/>
        <path d="M11.5 20l5.3-10.2L21.5 20Z" fill="#34D3B1" opacity=".9"/>
      </svg>

        <path d="M11.5 20l5.3-10.2L21.5 20Z" fill="#34D3B1" opacity=".9"/>
      </svg>
      <b>Ascent</b>
    </div>
    <div class="tb-act">
      <button class="icon-btn" data-action="palette" aria-label="Command palette">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>

        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>

    <section class="view" data-view="dashboard" id="view-dashboard"></section>
    <section class="view" data-view="subjects"  id="view-subjects"></section>

<div id="toast-root" class="toasts" aria-live="polite"></div>

<script>
'use strict';
/* ============================================================
   Ascent — GATE CSE & DA command center
   State, storage & domain math
   ============================================================ */

/* ---------- tiny helpers ---------- */
const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
const clamp = (n, a, b) => Math.min(b, Math.max(a, n));
const DAY = 86400000;
const pad2 = n => String(n).padStart(2, '0');
const isoOf = d => d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
const todayISO = () => isoOf(new Date());
const parseISO = s => { const p = String(s).split('-').map(Number); return new Date(p[0], (p[1] || 1) - 1, p[2] || 1); };
const daysUntil = iso => Math.round((parseISO(iso).getTime() - parseISO(todayISO()).getTime()) / DAY);
const addDays = (iso, n) => isoOf(new Date(parseISO(iso).getTime() + n * DAY));
const fmtD  = iso => { try { return parseISO(iso).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); } catch (e) { return iso; } };
const fmtDY = iso => { try { return parseISO(iso).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }); } catch (e) { return iso; } };
const fmtH = h => { h = Math.max(0, +h || 0); const r = Math.round(h * 10) / 10; return (Number.isInteger(r) ? r : r.toFixed(1)) + 'h'; };
const fmtN = n => (+n || 0).toLocaleString('en-IN');
const pct = (a, b) => b > 0 ? clamp(a / b, 0, 1) : 0;

/* ---------- storage (localStorage with in-memory fallback) ---------- */
const KEY = 'ascent-gate-v1';
const storage = (() => {
  try {
    const t = '__ascent_probe';
    localStorage.setItem(t, '1'); localStorage.removeItem(t);
    return { ok: true, get: () => localStorage.getItem(KEY), set: v => localStorage.setItem(KEY, v) };
  } catch (e) {
    let mem = null;
    return { ok: false, get: () => mem, set: v => { mem = v; } };
  }
})();

/* ---------- default data ----------
   Lecture counts & weightages are practical estimates for a
   GO Classes–style syllabus. Every value is editable in the UI. */
const PALETTE = ['#7C93FF','#34D3B1','#FFC554','#FF8FB1','#B78CFF','#5EC8F2','#F0916B','#8FD16E','#F2C14E','#6FA8FF','#E08CC7','#63D9C4','#FFA36C','#9BA8FF','#7FD4A8','#F27E9B','#8CC7FF','#D9B45C','#A6E06B','#FF9E7C'];

/* [name, exam, lectures, weightCSE, weightDA, pyqPool] */
const DEF_SUBJECTS = [
  ['General Aptitude',        'both', 30, 15, 15, 250],
  ['Linear Algebra',          'both', 45,  3,  7, 120],
  ['Probability & Statistics','both', 60,  3, 17, 140],
  ['DBMS',                    'both', 55,  8,  6, 220],
  ['Discrete Mathematics',    'cse',  90,  7,  0, 300],
  ['Calculus (Engg Math)',    'cse',  22,  2,  0,  60],
  ['Digital Logic',           'cse',  50,  4,  0, 180],
  ['Computer Organization',   'cse',  65,  8,  0, 220],
  ['C Programming',           'cse',  55,  6,  0, 180],
  ['Data Structures',         'cse',  45,  7,  0, 180],
  ['Algorithms',              'cse',  70,  7,  0, 250],
  ['Theory of Computation',   'cse',  65,  7,  0, 280],
  ['Compiler Design',         'cse',  40,  4,  0, 130],
  ['Operating Systems',       'cse',  60,  9,  0, 230],
  ['Computer Networks',       'cse',  45,  8,  0, 200],
  ['Calculus & Optimization', 'da',   30,  0,  6,  60],
  ['Python & DSA',            'da',   55,  0, 12, 100],
  ['Machine Learning',        'da',   85,  0, 25, 150],
  ['Artificial Intelligence', 'da',   45,  0, 10,  80],
  ['Data Warehousing',        'da',   12,  0,  2,  30],
];

function seedSubjects() {
  return DEF_SUBJECTS.map((r, i) => ({
    id: uid(), name: r[0], exam: r[1], total: r[2], done: 0,
    wc: r[3], wd: r[4], pyqTotal: r[5], pyqDone: 0, rev: 0,
    color: PALETTE[i % PALETTE.length],
  }));
}

function defaultState() {
  return {
    v: 1,
    settings: {
      theme: 'dark', mode: 'both',
      dateCSE: '2027-02-06', dateDA: '2027-02-07',
      dailyHours: 6, hoursWk: 6, hoursWe: 8, buffer: 30, effMin: 55,
      revInts: [7, 21, 60], revRepeat: 45,
      accentAuto: true, notify: false,
      pomoWork: 50, pomoBreak: 10,
      gist: { token: '', id: '', last: '' },
    },
    subjects: seedSubjects(),
    logs: {}, mocks: [], planChecks: {}, planEdits: {}, planRepeat: [], paceHist: {},
    timer: null,
    flags: { welcome: true, notified: '' },
  };
}

let S = load();
function load() {
  try {
    const raw = storage.get();
    if (!raw) return defaultState();
    const d = JSON.parse(raw);
    const base = defaultState();
    if (!d || typeof d !== 'object') return base;
    const st = Object.assign(base.settings, d.settings || {});
    if (d.settings && d.settings.hoursWk == null && d.settings.dailyHours != null) {
      st.hoursWk = +d.settings.dailyHours || 6;
      st.hoursWe = Math.min(14, (+d.settings.dailyHours || 6) + 2);
    }
    if (!Array.isArray(st.revInts) || !st.revInts.length) st.revInts = [7, 21, 60];
    if (!st.gist || typeof st.gist !== 'object') st.gist = { token: '', id: '', last: '' };
    return {
      v: 1,
      settings: st,
      subjects: Array.isArray(d.subjects) && d.subjects.length ? d.subjects : base.subjects,
      logs: d.logs && typeof d.logs === 'object' ? d.logs : {},
      mocks: Array.isArray(d.mocks) ? d.mocks : [],
      planChecks: d.planChecks && typeof d.planChecks === 'object' ? d.planChecks : {},
      planEdits: d.planEdits && typeof d.planEdits === 'object' ? d.planEdits : {},
      planRepeat: Array.isArray(d.planRepeat) ? d.planRepeat : [],
      paceHist: d.paceHist && typeof d.paceHist === 'object' ? d.paceHist : {},
      timer: d.timer && typeof d.timer === 'object' ? d.timer : null,
      flags: Object.assign(base.flags, d.flags || {}),
    };
  } catch (e) { return defaultState(); }
}

function redactedState() {
  const clone = JSON.parse(JSON.stringify(S));
  if (clone.settings && clone.settings.gist) clone.settings.gist.token = '';
  return clone;
}

let saveT = null;
function save() {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    try {
      storage.set(JSON.stringify(S));
      const el = $('#save-dot');
      if (el) { el.classList.add('on'); setTimeout(() => el.classList.remove('on'), 900); }
    } catch (e) {
      toast('Could not save — your browser is blocking storage here (private/incognito mode, storage full, or an embedded preview). Open the deployed page in a normal browser tab.');
    }
  }, 200);
}

/* ============================================================
   Domain: phases, pacing, projections, streaks, today's plan
   ============================================================ */
const PHASES = [
  { min: 150, name: 'Foundation',        color: '#7C93FF', range: '150+ days out',
    split: { lec: .60, prac: .25, rev: .10, mock: .05 }, mocksWk: 1, mockType: 'topic test',
    tip: 'Go deep on concepts. Push lecture pace, but never skip the "why" — GATE punishes shallow learning.' },
  { min: 90,  name: 'Core Learning',     color: '#5EC8F2', range: '90–150 days out',
    split: { lec: .50, prac: .30, rev: .12, mock: .08 }, mocksWk: 1, mockType: 'subject test',
    tip: 'Keep lecture momentum, and give every finished subject a PYQ pass within a week — before it fades.' },
  { min: 45,  name: 'Consolidation',     color: '#34D3B1', range: '45–90 days out',
    split: { lec: .30, prac: .40, rev: .18, mock: .12 }, mocksWk: 1, mockType: 'full-length mock',
    tip: 'Practice overtakes lectures. Weekly full mocks start now — treat every mock analysis as a study session.' },
  { min: 20,  name: 'Intensive Practice',color: '#FFC554', range: '20–45 days out',
    split: { lec: .12, prac: .40, rev: .28, mock: .20 }, mocksWk: 2, mockType: 'full-length mock',
    tip: 'No new topics unless critical. Grind PYQs, patch weak areas from mock analysis, tighten formula sheets.' },
  { min: 0,   name: 'Final Sprint',      color: '#FF8FB1', range: 'last 20 days',
    split: { lec: .05, prac: .25, rev: .40, mock: .30 }, mocksWk: 3, mockType: 'full-length mock',
    tip: 'Mock, analyse, revise, sleep. Alternate mock days with revision days — recall beats cramming, always.' },
];
const MOCK_DAYS = { 1: [0], 2: [0, 3], 3: [0, 2, 4] };  /* getDay(): Sun=0 */
function phaseFor(days) { for (const p of PHASES) if (days >= p.min) return p; return PHASES[PHASES.length - 1]; }

const EXAMS = { cse: { label: 'GATE CSE', short: 'CSE' }, da: { label: 'GATE DA', short: 'DA' } };
function activeExamKeys() { const m = S.settings.mode; return m === 'both' ? ['cse', 'da'] : [m]; }
function examMeta(k) {
  const date = k === 'cse' ? S.settings.dateCSE : S.settings.dateDA;
  return { key: k, label: EXAMS[k].label, short: EXAMS[k].short, date, days: daysUntil(date) };
}
function activeExams()   { return activeExamKeys().map(examMeta); }
function upcomingExams() { return activeExams().filter(e => e.days > 0).sort((a, b) => a.days - b.days); }
function subjectVisible(s) { const m = S.settings.mode; return m === 'both' || s.exam === 'both' || s.exam === m; }
function activeSubjects()  { return S.subjects.filter(subjectVisible); }
function subjectsForExam(k){ return S.subjects.filter(s => s.exam === k || s.exam === 'both'); }
function remHrs(s) { return Math.max(0, (+s.total || 0) - (+s.done || 0)) * (+S.settings.effMin || 55) / 60; }
function isWeekend(d) { const g = d.getDay(); return g === 0 || g === 6; }
function hoursFor(dateOrIso) {
  const d = typeof dateOrIso === 'string' ? parseISO(dateOrIso) : dateOrIso;
  const s = S.settings;
  return clamp(isWeekend(d) ? (+s.hoursWe || +s.dailyHours || 6) : (+s.hoursWk || +s.dailyHours || 6), .5, 24);
}
function avgDailyHours() {
  const s = S.settings;
  const wk = clamp(+s.hoursWk || +s.dailyHours || 6, .5, 24), we = clamp(+s.hoursWe || +s.dailyHours || 6, .5, 24);
  return (wk * 5 + we * 2) / 7;
}
function hoursToday() { return hoursFor(new Date()); }
function wMax(s)   { return Math.max(+s.wc || 0, +s.wd || 0); }

function lecTotals(list) {
  let total = 0, done = 0;
  for (const s of list) { total += +s.total || 0; done += Math.min(+s.done || 0, +s.total || 0); }
  return { total, done, rem: total - done, remH: (total - done) * (+S.settings.effMin || 55) / 60 };
}
function weightedProgress(k) {
  let W = 0, acc = 0;
  for (const s of subjectsForExam(k)) {
    const w = k === 'cse' ? +s.wc || 0 : +s.wd || 0;
    if (w <= 0 || !(+s.total > 0)) continue;
    W += w; acc += w * pct(+s.done || 0, +s.total);
  }
  return W > 0 ? acc / W : 0;
}

/* The heart of the tracker: required daily lecture-hours, computed
   per subject against its own effective deadline (exam − buffer),
   with subjects common to both papers paced by the nearer exam. */
function pacing() {
  const ex = upcomingExams();
  if (!ex.length) return null;
  const buf = clamp(Math.round(+S.settings.buffer || 0), 0, 120);
  const eff = clamp(+S.settings.effMin || 55, 15, 240);
  const H   = avgDailyHours();
  const dEff = {};
  ex.forEach(e => { dEff[e.key] = Math.max(1, e.days - buf); });
  const minD = Math.min(...ex.map(e => dEff[e.key]));

  let needH = 0, remLect = 0;
  for (const s of activeSubjects()) {
    const rem = Math.max(0, (+s.total || 0) - (+s.done || 0));
    if (!rem) continue;
    let d = null;
    if (s.exam === 'both') d = minD;
    else { if (!ex.some(x => x.key === s.exam)) continue; d = dEff[s.exam]; }
    remLect += rem;
    needH += rem * eff / 60 / d;
  }

  const nearest = ex[0];
  const phase = phaseFor(nearest.days);
  const availLecH = H * phase.split.lec;
  const lectPerDay = needH * 60 / eff;
  const totalNeeded = phase.split.lec > 0 ? needH / phase.split.lec : needH;
  const ratio = availLecH > 0 ? needH / availLecH : (needH > 0 ? 9 : 0);
  const status = remLect === 0 ? 'done' : ratio <= 1.02 ? 'ok' : ratio <= 1.35 ? 'warn' : 'bad';

  /* Adaptive layer: your actual behaviour bends the target.
     Behind on hours  → the deficit is amortised over the next 14 days (target rises).
     Ahead on hours   → the surplus is credited back (target falls), capped so you
     can't coast a whole week off one heroic Sunday. */
  const dbt = debtState();
  const rawAdj = dbt.ready ? dbt.debt / (dbt.window || 14) : 0;
  const adj = clamp(rawAdj, -1.5, 3);
  const adaptive = clamp(totalNeeded + adj, remLect === 0 ? 0 : .5, 18);
  const trend = paceTrend(adaptive);

  return { ex, nearest, phase, needH, availLecH, lectPerDay, totalNeeded, remLect, status, ratio,
           dEff, buf, H, eff, todayH: hoursToday(), dbt, adj, adaptive, trend };
}

/* Records today's adaptive target and reports the 7-day change. */
function paceTrend(adaptive) {
  const t = todayISO();
  if (!S.paceHist) S.paceHist = {};
  const prev = S.paceHist[addDays(t, -7)] ?? S.paceHist[addDays(t, -6)] ?? S.paceHist[addDays(t, -8)];
  if (S.paceHist[t] !== Math.round(adaptive * 100) / 100) {
    S.paceHist[t] = Math.round(adaptive * 100) / 100;
    const keys = Object.keys(S.paceHist).sort();
    while (keys.length > 200) delete S.paceHist[keys.shift()];
  }
  if (prev == null) return null;
  const d = adaptive - prev;
  return { prev, delta: d, dir: Math.abs(d) < .05 ? 'flat' : d < 0 ? 'down' : 'up' };
}

function recentPace(n = 14) {
  const t = parseISO(todayISO()).getTime();
  let lect = 0, hrs = 0, logged = 0;
  for (let i = 0; i < n; i++) {
    const l = S.logs[isoOf(new Date(t - i * DAY))];
    if (l) { logged++; lect += +l.lectures || 0; hrs += +l.hours || 0; }
  }
  return { n, logged, lectPerDay: lect / n, hrsPerDay: hrs / n };
}
function projection(p) {
  const pace = recentPace();
  if (!p || p.remLect === 0) return { pace, ready: false };
  if (pace.logged < 3 || pace.lectPerDay <= 0) return { pace, ready: false };
  const days = Math.ceil(p.remLect / pace.lectPerDay);
  const finish = addDays(todayISO(), days);
  const target = addDays(p.nearest.date, -p.buf);
  return { pace, ready: true, finish, target, ok: parseISO(finish) <= parseISO(target), days };
}

function hasLog(iso) {
  const l = S.logs[iso];
  return !!l && ((+l.hours || 0) > 0 || (+l.lectures || 0) > 0 || (+l.questions || 0) > 0);
}
function streaks() {
  let cur = 0, d = parseISO(todayISO());
  if (!hasLog(isoOf(d))) d = new Date(d.getTime() - DAY);
  while (hasLog(isoOf(d))) { cur++; d = new Date(d.getTime() - DAY); }
  const days = Object.keys(S.logs).filter(hasLog).sort();
  let best = 0, run = 0, prev = null;
  for (const k of days) {
    run = (prev && Math.round((parseISO(k) - parseISO(prev)) / DAY) === 1) ? run + 1 : 1;
    best = Math.max(best, run); prev = k;
  }
  let totalH = 0, totalL = 0, totalQ = 0;
  for (const l of Object.values(S.logs)) { totalH += +l.hours || 0; totalL += +l.lectures || 0; totalQ += +l.questions || 0; }
  return { cur, best, totalH, totalL, totalQ, daysLogged: days.length };
}

function planChecksToday() {
  const t = todayISO();
  for (const k of Object.keys(S.planChecks)) if (k !== t) delete S.planChecks[k];
  if (!S.planChecks[t]) S.planChecks[t] = {};
  return S.planChecks[t];
}

/* Auto-generated daily to-do, derived from phase split + progress.
   Items carry stable ids so checks / edits can be keyed to them. */
function autoPlan() {
  const p = pacing();
  const items = [];
  if (!p) {
    items.push({ id: 'a-none', ic: 'flag', text: 'No upcoming exam date set', meta: 'Add one in Settings and the plan builds itself' });
    return { items, p: null };
  }
  const H = p.todayH || p.H, sp = p.phase.split, dow = new Date().getDay();
  const lecH = H * sp.lec, pracH = H * sp.prac, revH = H * sp.rev, mockH = H * sp.mock;
  const subs = activeSubjects();

  const inProg = subs.filter(s => s.done > 0 && s.done < s.total)
                     .sort((a, b) => pct(b.done, b.total) - pct(a.done, a.total));
  const unstarted = subs.filter(s => (+s.done || 0) === 0 && s.total > 0)
                        .sort((a, b) => wMax(b) - wMax(a));
  const lecSub = inProg[0] || unstarted[0];
  if (p.remLect > 0 && lecH >= .4 && lecSub) {
    const n = Math.max(1, Math.round(lecH * 60 / p.eff));
    items.push({ id: 'a-lec', ic: 'play', text: `Watch ${n} lecture${n > 1 ? 's' : ''} — ${lecSub.name}`,
                 meta: `${fmtH(lecH)} · ${lecSub.done}/${lecSub.total} done` });
  }

  const isMockDay = (MOCK_DAYS[p.phase.mocksWk] || []).includes(dow);
  if (isMockDay && mockH >= 1) {
    items.push({ id: 'a-mock', ic: 'gauge', text: `Take a ${p.phase.mockType} (${p.nearest.short}) + full analysis`,
                 meta: `${fmtH(Math.max(mockH, 3))} · log the score in Mocks` });
  } else if (mockH >= .4) {
    items.push({ id: 'a-mock', ic: 'zap', text: 'Timed PYQ sprint — 60 min under exam conditions', meta: fmtH(mockH) });
  }

  const pracPool = subs.filter(s => s.total > 0 && pct(s.done, s.total) >= .5 && (+s.pyqTotal || 0) > 0)
                       .sort((a, b) => pct(a.pyqDone, a.pyqTotal) - pct(b.pyqDone, b.pyqTotal));
  const pracSub = pracPool[0] || inProg[0] || lecSub;
  if (pracH >= .4 && pracSub) {
    const early = pct(pracSub.done, pracSub.total) < .5;
    const q = Math.max(5, Math.round(pracH * 15));
    items.push({ id: 'a-prac', ic: 'pencil',
      text: early ? `Practice problems from today's lectures — ${pracSub.name}` : `Solve ~${q} PYQs — ${pracSub.name}`,
      meta: `${fmtH(pracH)}${!early && (+pracSub.pyqTotal || 0) ? ` · ${pracSub.pyqDone || 0}/${pracSub.pyqTotal} done` : ' · lock it in while it\u2019s fresh'}` });
  }

  const revPool = subs.filter(s => s.total > 0 && s.done >= s.total)
                      .sort((a, b) => (+a.rev || 0) - (+b.rev || 0));
  if (revH >= .3) {
    if (revPool.length) {
      const r = revPool[0];
      items.push({ id: 'a-rev', ic: 'rotate', text: `Revise ${r.name} — short notes + formula sheet`,
                   meta: `${fmtH(revH)} · revision ${(+r.rev || 0) + 1}` });
    } else if (inProg.length > 1) {
      items.push({ id: 'a-rev', ic: 'rotate', text: `Quick revision — yesterday's lectures of ${inProg[1].name}`, meta: fmtH(revH) });
    } else {
      items.push({ id: 'a-rev', ic: 'rotate', text: 'Active recall — rewrite today\u2019s notes from memory', meta: `${fmtH(revH)} · blank-page test` });
    }
  }

  const due = revDue();
  if (due.length) {
    const d0 = due[0];
    items.push({ id: 'a-revdue', ic: 'rotate',
      text: `Revision ${d0.r.pass}: ${d0.s.name} — spaced repetition due`,
      meta: `${due.length > 1 ? `${due.length} subjects due · ` : ''}${d0.r.dueIn === 0 ? 'due today' : `${-d0.r.dueIn} days overdue`} · mark it done on the card` });
  }
  const weak = weakSubjects();
  if (weak.length) {
    items.push({ id: 'a-weak', ic: 'alert', text: `Patch weak area — ${weak[0].s.name}`,
      meta: `flagged in ${weak[0].n} recent mock${weak[0].n > 1 ? 's' : ''} · targeted PYQs + notes` });
  }
  items.push({ id: 'a-apt', ic: 'spark', text: 'General Aptitude drill — 20 min speed round', meta: 'daily habit, 15 easy marks' });
  return { items, p };
}

/* Today's plan = auto items + your repeating tasks, unless you've edited
   today's list — in which case your edited snapshot wins. */
function planDay() {
  const t = todayISO();
  for (const k of Object.keys(S.planEdits)) if (k !== t) delete S.planEdits[k];
  return t;
}
function repeatItems() {
  return (S.planRepeat || []).map(r => ({ id: r.id, ic: r.ic || 'check', text: r.text, meta: r.meta || '', repeat: true }));
}
function todaysPlan() {
  const t = planDay();
  const auto = autoPlan();
  const snap = S.planEdits[t];
  if (snap && Array.isArray(snap.items)) return { items: snap.items, p: auto.p, edited: true };
  return { items: auto.items.concat(repeatItems()), p: auto.p, edited: false };
}
/* Freeze today's list so it can be edited without the generator overwriting it. */
function freezePlan() {
  const t = planDay();
  if (!S.planEdits[t]) S.planEdits[t] = { items: todaysPlan().items.map(x => Object.assign({}, x)) };
  return S.planEdits[t];
}

let gid = 0;
function ring(p, o = {}) {
  const size = o.size || 108, st = o.stroke || 9;
  const r = (size - st) / 2, c = 2 * Math.PI * r, off = c * (1 - clamp(p, 0, 1));
  const id = 'rg' + (++gid);
  return `<div class="ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="${o.c1 || '#7C93FF'}"/><stop offset="1" stop-color="${o.c2 || '#5EC8F2'}"/>
      </linearGradient></defs>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" class="ring-bg" stroke-width="${st}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" class="ring-fg" stroke="url(#${id})" stroke-width="${st}"
        stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>
    <div class="ring-lb"><b>${Math.round(p * 100)}%</b><span>${esc(o.label || '')}</span></div>
  </div>`;
}

function heatmap() { return hmMode === 'month' ? heatMonth() : heatYear(); }

function heatYear() {
  const narrow = (window.innerWidth || 1200) < 720;
  const monthsBack = narrow ? 4 : 7;
  const today = parseISO(todayISO());
  const end = today.getTime();
  /* start at the Sunday on/before the 1st of the earliest month → every month shown is complete */
  const firstOfSpan = new Date(today.getFullYear(), today.getMonth() - (monthsBack - 1), 1);
  const startSun = new Date(firstOfSpan.getTime() - firstOfSpan.getDay() * DAY);
  const endSat = new Date(end + (6 - today.getDay()) * DAY);
  const weeks = Math.round((endSat.getTime() - startSun.getTime()) / (7 * DAY)) + 1;

  let cells = '', months = '';
  for (let w = 0; w < weeks; w++) {
    for (let d = 0; d < 7; d++) {
      const t = new Date(startSun.getTime() + (w * 7 + d) * DAY);
      const iso = isoOf(t);
      if (t.getTime() > end) { cells += `<span class="hc future" title="${fmtDY(iso)}"></span>`; continue; }
      const l = S.logs[iso], h = l ? +l.hours || 0 : 0, lect = l ? +l.lectures || 0 : 0;
      cells += `<span class="hc l${HLV(h)}" title="${fmtDY(iso)} · ${h ? fmtH(h) : 'no log'}${lect ? ` · ${lect} lect` : ''}"></span>`;
    }
    /* label the column that contains the 1st of a month → one label per month, never colliding */
    for (let d = 0; d < 7; d++) {
      const t = new Date(startSun.getTime() + (w * 7 + d) * DAY);
      if (t.getDate() === 1) {
        months += `<span style="grid-column:${w + 1} / span 4">${MON[t.getMonth()]}${t.getMonth() === 0 ? " '" + String(t.getFullYear()).slice(2) : ''}</span>`;
        break;
      }
    }
  }
  const st = streaks();
  const DOW = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return `<div class="heat-scroll"><div class="heat-wrap">
    <div class="heat-days">${DOW.map(d => `<span>${d}</span>`).join('')}</div>
    <div class="heat-body">
      <div class="heat-months">${months}</div>
      <div class="heat">${cells}</div>
    </div>
  </div></div>
  <div class="tiny muted mt6">Last ${monthsBack} months · ${st.daysLogged} days logged · ${fmtH(st.totalH)} total. Hover a square for the day; switch to <b>Month</b> for exact hours per day.</div>`;
}

function heatMonth() {
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + hmOff);
  const y = base.getFullYear(), m = base.getMonth();
  const first = new Date(y, m, 1), lastDay = new Date(y, m + 1, 0).getDate();
  const lead = first.getDay();
  const t = todayISO();
  let cells = '';
  let tot = 0, lect = 0, qs = 0, studied = 0, best = { h: 0, iso: null };
  for (let d = 1; d <= lastDay; d++) {
    const iso = isoOf(new Date(y, m, d));
    const l = S.logs[iso];
    const h = l ? +l.hours || 0 : 0;
    if (h > 0) { studied++; tot += h; }
    if (l) { lect += +l.lectures || 0; qs += +l.questions || 0; }
    if (h > best.h) best = { h, iso };
    const future = iso > t;
    cells += `<button class="mc l${HLV(h)}${iso === t ? ' today' : ''}${future ? ' future' : ''}"${d === 1 ? ` style="grid-column-start:${lead + 1}"` : ''} data-action="hm-day" data-date="${iso}"
      title="${fmtDY(iso)}${l ? ` · ${fmtH(h)} · ${+l.lectures || 0} lect · ${+l.questions || 0} q${l.note ? ' · ' + esc(l.note) : ''}` : ' · no log'}">
      <b>${d}</b><span>${h ? (Math.round(h * 10) / 10) + 'h' : ''}</span></button>`;
  }
  const days = hmOff === 0 ? parseISO(t).getDate() : lastDay;
  const planned = (() => { let a = 0; for (let d = 1; d <= days; d++) a += hoursFor(new Date(y, m, d)); return a; })();
  return `<div class="month-wrap">
    <div class="mcal-box">
      <div class="mcal-head"><b>${first.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}</b>
        <span class="tiny muted">${studied}/${days} days · ${fmtH(tot)}</span></div>
      <div class="mcal-dow">${['S','M','T','W','T','F','S'].map(d => `<span>${d}</span>`).join('')}</div>
      <div class="mcal">${cells}</div>
      <div class="tiny muted mt6">Tap any day to edit its log.${qs ? ` ${fmtN(qs)} questions solved this month.` : ''}</div>
    </div>
    <div class="month-stats">
      <div class="statgrid">
        <div class="stat"><b class="disp">${fmtH(tot)}</b><span>logged</span></div>
        <div class="stat"><b class="disp">${studied}/${days}</b><span>days studied</span></div>
        <div class="stat"><b class="disp ${tot >= planned ? 'ok-t' : 'bad-t'}">${tot >= planned ? '+' : '−'}${fmtH(Math.abs(tot - planned))}</b><span>vs plan</span></div>
        <div class="stat"><b class="disp">${studied ? fmtH(tot / studied) : '—'}</b><span>avg / day</span></div>
        <div class="stat"><b class="disp">${fmtN(lect)}</b><span>lectures</span></div>
        <div class="stat"><b class="disp">${best.iso ? fmtD(best.iso) : '—'}</b><span>best${best.iso ? ` · ${fmtH(best.h)}` : ''}</span></div>
      </div>
      <div style="margin-top:12px">${bar(planned > 0 ? tot / planned : 0, tot >= planned ? 'var(--ok)' : 'var(--warn)')}</div>
      <div class="tiny muted">Planned this month so far: ${fmtH(planned)} · logged ${fmtH(tot)} (${planned > 0 ? Math.round(tot / planned * 100) : 0}% adherence)</div>
    </div>
  </div>`;
}

function weekBars() {
  const t = parseISO(todayISO()).getTime();
  const names = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  const arr = []; let max = 0;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(t - i * DAY);
    const l = S.logs[isoOf(d)], h = l ? +l.hours || 0 : 0;
    max = Math.max(max, h); arr.push({ d, h });
  }
  const out = arr.map(a => {
    const hp = max > 0 ? Math.max(6, a.h / max * 100) : 6;
    return `<div class="wb" title="${fmtD(isoOf(a.d))} · ${fmtH(a.h)}"><i class="${a.h ? '' : 'z'}" style="height:${hp.toFixed(0)}%"></i><span>${names[a.d.getDay()]}</span></div>`;
  }).join('');
  return `<div class="wbars">${out}</div>`;
}

function allocDonut(sp, H) {
  const segs = [['Lectures', sp.lec, '#7C93FF'], ['Practice', sp.prac, '#34D3B1'], ['Revision', sp.rev, '#FFC554'], ['Mocks', sp.mock, '#FF8FB1']];
  let acc = 0;
  const stops = segs.map(s => { const a = (acc * 100).toFixed(1); acc += s[1]; return `${s[2]} ${a}% ${(acc * 100).toFixed(1)}%`; }).join(',');
  const chips = segs.map(s => `<div class="al-chip"><i style="background:${s[2]}"></i><div><b>${s[0]}</b><span>${Math.round(s[1] * 100)}% · ${fmtH(H * s[1])}/day</span></div></div>`).join('');
  return `<div class="alloc"><div class="donut" style="background:conic-gradient(${stops})"><i></i><div class="donut-lb"><b>${fmtH(H)}</b><span>per day</span></div></div><div class="al-chips">${chips}</div></div>`;
}

function phaseTimeline(e) {
  const days = e.days, cur = phaseFor(days);
  const total = Math.max(days, 1);
  let segs = '', rows = '', prev = days;
  for (const p of PHASES) {
    const hi = prev, lo = p.min, len = hi - lo;
    if (len <= 0) { prev = Math.min(prev, lo); continue; }
    const wp = len / total * 100;
    const from = addDays(e.date, -hi), to = addDays(e.date, -lo);
    const range = `${fmtD(from)} – ${fmtD(to)}`;
    segs += `<div class="ph-seg${p === cur ? ' now' : ''}" style="width:${wp.toFixed(2)}%;--pc:${p.color}" title="${p.name} · ${range} · ${len} days"><i></i>${wp >= 13 ? `<span>${p.name}</span>` : ''}</div>`;
    rows += `<div class="ph-row${p === cur ? ' now' : ''}">
      <i style="background:${p.color}"></i>
      <div class="ph-nm"><b>${p.name}</b>${p === cur ? '<span class="badge s-ok">you are here</span>' : ''}</div>
      <div class="ph-dt">${range}</div>
      <div class="ph-ln">${len} day${len === 1 ? '' : 's'}</div>
      <div class="ph-sp">${Math.round(p.split.lec * 100)}/${Math.round(p.split.prac * 100)}/${Math.round(p.split.rev * 100)}/${Math.round(p.split.mock * 100)} · ${p.mocksWk}× ${p.mockType}/wk</div>
    </div>`;
    prev = lo;
  }
  return `<div class="phasebar">${segs}</div>
    <div class="ph-axis"><span>Today · ${days} days left</span><span>${fmtD(e.date)} · exam day</span></div>
    <div class="ph-legend">${rows}</div>
    <div class="tiny muted mt6">Split = % of each day on lectures / practice / revision / mocks.</div>`;
}

function mockChart(list) {
  const w = 640, h = 210, padL = 34, padR = 16, padT = 14, padB = 26;
  const xs = i => padL + (w - padL - padR) * (list.length === 1 ? .5 : i / (list.length - 1));
  const vals = list.map(m => pct(+m.score || 0, +m.total || 100) * 100);
  const ymax = Math.max(60, Math.ceil(Math.max(...vals) / 10) * 10);
  const ys = v => padT + (h - padT - padB) * (1 - v / ymax);
  let grid = '';
  for (let g = 0; g <= 4; g++) {
    const v = ymax * g / 4, y = ys(v);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w - padR}" y2="${y.toFixed(1)}" class="mg"/><text x="${padL - 7}" y="${(y + 3).toFixed(1)}" text-anchor="end" class="mct">${Math.round(v)}</text>`;
  }
  const P = list.map((m, i) => [xs(i), ys(vals[i])]);
  const line = P.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = `M${P[0][0].toFixed(1)},${h - padB} ` + P.map(p => `L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') + ` L${P[P.length - 1][0].toFixed(1)},${h - padB} Z`;
  let dots = '';
  list.forEach((m, i) => {
    dots += `<circle cx="${P[i][0].toFixed(1)}" cy="${P[i][1].toFixed(1)}" r="4.5" class="md ${m.exam === 'da' ? 'da' : 'cse'}"><title>${esc(m.name || 'Mock')} · ${fmtD(m.date)} · ${vals[i].toFixed(0)}%</title></circle>`;
  });
  const xlab = `<text x="${padL}" y="${h - 8}" class="mct">${fmtD(list[0].date)}</text><text x="${w - padR}" y="${h - 8}" text-anchor="end" class="mct">${fmtD(list[list.length - 1].date)}</text>`;
  return `<svg class="mockchart" viewBox="0 0 ${w} ${h}" role="img" aria-label="Mock score trend">${grid}${xlab}<path d="${area}" class="ma"/><polyline points="${line}" class="ml"/>${dots}</svg>`;
}

/* live countdown */
function tick() {
  const now = Date.now();
  $$('[data-count]').forEach(card => {
    const e = examMeta(card.dataset.count);
    let ms = parseISO(e.date).getTime() - now;
    if (ms <= 0) return;
    const d = Math.floor(ms / DAY); ms -= d * DAY;
    const h = Math.floor(ms / 3600000); ms -= h * 3600000;
    const m = Math.floor(ms / 60000);
    const dEl = card.querySelector('.cd-d'), hm = card.querySelector('.cd-hm');
    if (dEl) dEl.textContent = d;
    if (hm) hm.textContent = `+ ${h}h ${pad2(m)}m`;
  });
}
